                                                      <input type="file" multiple className="hidden" onChange={e => setUpdateFiles(prev => [...prev, ...Array.from(e.target.files)])} disabled={isUploading || isSubmittingAction} />
                                                  </label>

                                                  <button onClick={submitUpdate} disabled={(!updateText.trim() && updateFiles.length === 0) || isSubmittingAction || isUploading} className="px-6 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold hover:bg-indigo-700 transition-all disabled:opacity-50 flex items-center gap-2 shadow-sm shadow-indigo-200">
                                                      {isSubmittingAction || isUploading ? <Loader2 size={14} className="animate-spin" /> : <Plus size={14} />} 
                                                      {isUploading ? 'Wysyłanie...' : 'Dodaj wpis'}
                                                  </button>
                                              </div>
                                              
                                              {isUploading && uploadProgress > 0 && (
                                                  <div className="w-full bg-slate-200 rounded-full h-1 mt-2 overflow-hidden">
                                                      <div className="bg-indigo-500 h-1 transition-all duration-300" style={{ width: `${uploadProgress}%` }}></div>
                                                  </div>
                                              )}
                                          </div>
                                      </div>
                                  </div>
                             </div>
                         </div>

                         <div className="space-y-6">
                             <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                 <h3 className="text-sm font-bold text-indigo-950 flex items-center gap-2 mb-4"><ImageIcon size={18} className="text-indigo-500" /> Zdjęcia i Załączniki</h3>
                                 
                                 <div className="space-y-6">
                                    {mainAttachments.length > 0 && (
                                        <div>
                                            <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3">Załączniki główne zgłoszenia</h4>
                                            <div className="grid grid-cols-2 gap-3">
                                                {mainAttachments.map(att => (
                                                    <AttachmentItem key={att.id} att={att} onDelete={() => onDeleteAttachment(att)} onPreview={onPreview} canModify={canModifyItem(att.authorEmail)} />
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {updateAttachments.length > 0 && (
                                        <div className={mainAttachments.length > 0 ? "pt-4 border-t border-slate-100" : ""}>
                                            <h4 className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-3 flex items-center gap-1.5"><MessageSquare size={12} className="text-indigo-400"/> Z wątków dyskusji</h4>
                                            <div className="grid grid-cols-2 gap-3">
                                                {updateAttachments.map(att => (
                                                    <div key={att.id} className="relative group bg-slate-50 border border-slate-200 rounded-xl p-1 flex flex-col hover:border-indigo-200 hover:shadow-sm transition-all shadow-sm">
                                                        <AttachmentItem att={att} onDelete={() => onDeleteAttachment(att)} onPreview={onPreview} canModify={canModifyItem(att.authorEmail)} />
                                                        <div className="mt-1.5 px-1 pb-1">
                                                            <p className="text-[8px] uppercase tracking-wider text-slate-400 font-bold leading-none mb-0.5">Z wpisu:</p>
                                                            <p className="text-[10px] text-indigo-700 font-black tracking-tight">{new Date(att.updateDate).toLocaleString([], {year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'})}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {attachments.length === 0 && (
                                        <div className="text-center p-6 bg-slate-50 rounded-xl border border-dashed border-slate-200">
                                            <p className="text-xs text-slate-500 font-medium">Brak plików powiązanych ze zgłoszeniem.</p>
                                        </div>
                                    )}

                                    <div className="relative">
                                        <label className={`w-full flex flex-col items-center justify-center p-4 border-2 border-dashed border-slate-200 rounded-xl cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/50 transition-all ${isUploading ? 'pointer-events-none opacity-70' : ''}`}>
                                            <input type="file" multiple accept="image/*,.pdf,.doc,.docx" className="hidden" onChange={(e) => onUploadAttachment(e, ticket.id)} disabled={isUploading || isSubmittingAction} />
                                            {isUploading ? (
                                                <div className="text-center w-full px-2">
                                                    <Loader2 size={20} className="mx-auto mb-1 text-indigo-500 animate-spin" />
                                                    <div className="w-full bg-slate-200 rounded-full h-1 mt-2 overflow-hidden"><div className="bg-indigo-500 h-1 transition-all duration-300" style={{ width: `${uploadProgress}%` }}></div></div>
                                                </div>
                                            ) : (
                                                <div className="text-center">
                                                    <Plus size={20} className="mx-auto text-slate-400 mb-1" />
                                                    <span className="text-xs font-bold text-slate-500">Dołącz załączniki</span>
                                                </div>
                                            )}
                                        </label>
                                    </div>
                                 </div>
                             </div>

                             <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                <h3 className="text-sm font-bold text-indigo-950 flex items-center gap-2 mb-4">
                                    <RotateCcw size={18} className="text-indigo-500" /> Rejestr aktywności
                                </h3>
                                <div className="space-y-4 max-h-96 overflow-y-auto pr-2 scrollbar-hide">
                                    {ticketLogs.sort((a,b) => new Date(b.date) - new Date(a.date)).map(log => {
                                        const parsedDate = new Date(log.date);
                                        const isExpanded = expandedLogId === log.id;
                                        const lines = log.description.split('\n');
                                        const summary = lines[0];
                                        const details = lines.slice(1).join('\n').trim();
                                        const hasDetails = details.length > 0;

                                        return (
                                            <div key={log.id} className="relative pl-4 border-l-2 border-indigo-100 pb-4 last:border-0 last:pb-0">
                                                <div className="absolute w-2.5 h-2.5 bg-indigo-400 rounded-full -left-[6px] top-1 border-2 border-white"></div>
                                                <div className="text-[10px] text-slate-400 font-bold mb-1">{parsedDate.toLocaleDateString()} {parsedDate.toLocaleTimeString()}</div>
                                                <div 
                                                    className={`text-xs text-slate-700 font-medium ${hasDetails ? 'cursor-pointer hover:text-indigo-600 transition-colors' : ''} flex items-start justify-between group`}
                                                    onClick={() => hasDetails && setExpandedLogId(isExpanded ? null : log.id)}
                                                >
                                                    <div className="flex-1">
                                                        <span className="font-semibold">{summary}</span>
                                                    </div>
                                                    {hasDetails && (
                                                        <button className="text-slate-400 group-hover:text-indigo-600 transition-colors shrink-0 ml-2" title="Pokaż/ukryj szczegóły">
                                                            {isExpanded ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
                                                        </button>
                                                    )}
                                                    {canModifyItem(log.authorEmail) && (
                                                        <button onClick={(e) => { e.stopPropagation(); onDeleteLog(log.id); }} className="text-slate-400 hover:text-red-600 transition-colors shrink-0 ml-2" title="Usuń z historii trwale">
                                                            <Trash2 size={12} />
                                                        </button>
                                                    )}
                                                </div>
                                                {isExpanded && hasDetails && (
                                                    <div className="mt-2 p-3 bg-slate-50 rounded-xl text-xs text-slate-600 whitespace-pre-wrap leading-relaxed border border-slate-100 animate-in fade-in slide-in-from-top-1 duration-200">
                                                        {details}
                                                    </div>
                                                )}
                                            </div>
                                        )
                                    })}
                                    {ticketLogs.length === 0 && <p className="text-xs text-slate-400 italic">Brak zarejestrowanej historii.</p>}
                                </div>
                             </div>
                         </div>
                     </div>
                </div>
            );
        };

        const RestaurantDetailContent = ({ 
          r, tickets, tasks, notes, docs, historyLogs, activeDetailTab, setActiveDetailTab, setActiveTab, 
          setIsSettingsOpen, isSettingsOpen, setIsDeleteModalOpen, onEditClick, canModifyItem,
          onCreateTicket, onOpenTicket, onShareTicket, 
          isNoteModalOpen, setIsNoteModalOpen, newNote, setNewNote, onAddNote, onDeleteNote, onEditNote,
          onAddTask, onEditTask, onDeleteTask, onToggleTask, isSubmittingAction,
          onFileUpload, isUploadingDoc, uploadProgress, onDeleteDoc, onPreview, onDeleteLog
        }) => {
          const [report, setReport] = useState('');
          const [loading, setLoading] = useState(false);

          const generateReport = async () => {
            setLoading(true);
            try {
              const activeTickets = tickets.filter(t => t.restaurantId === r.id && t.status !== 'Zakończone');
              const openTasks = tasks.filter(t => t.restaurantId === r.id && !t.completed);
              const q = `Analiza lokalu: ${r.name}. Aktywne usterki: ${activeTickets.length > 0 ? activeTickets.map(t => t.title).join(', ') : 'brak'}. Zadania w toku: ${openTasks.length > 0 ? openTasks.map(t => t.title).join(', ') : 'brak'}. Napisz krótkie (3 zdania) podsumowanie statusu operacyjnego lokalu.`;
              const result = await callGemini(q, "Jesteś managerem operacyjnym. Podawaj profesjonalne analizy stanu placówek.");
              setReport(result);
            } catch (e) {
              setReport("Błąd generowania raportu.");
            } finally { setLoading(false); }
          };

          const counts = {
            docs: docs.filter(d => d.restaurantId === r.id).length,
            tickets: tickets.filter(t => t.restaurantId === r.id).length,
            tasks: tasks.filter(t => t.restaurantId === r.id).length,
            notes: notes.filter(n => n.restaurantId === r.id).length
          };

          return (
            <div className="space-y-6 animate-in fade-in duration-300">
              <button onClick={() => setActiveTab('restaurants')} className="text-indigo-600 font-semibold text-sm flex items-center gap-1 hover:underline group"><ChevronLeft size={16} className="group-hover:-translate-x-1 transition-transform" /> Powrót do bazy</button>
              
              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                 <div className={`absolute top-0 left-0 bottom-0 w-2 ${BRANDS[r.brand]?.color || 'bg-slate-400'}`} />
                <div className="flex flex-col md:flex-row justify-between gap-4">
                  <div className="flex gap-4 items-center">
                    <div className={`w-16 h-16 rounded-2xl flex items-center justify-center text-white text-xl font-black shadow-lg ${BRANDS[r.brand]?.color || 'bg-slate-400'}`}>{(r.brand && r.brand[0]) || 'R'}</div>
                    <div>
                      <div className="flex items-center gap-2"><h2 className="text-2xl font-bold text-indigo-950">{r.name}</h2><span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase ${BRANDS[r.brand]?.color || 'bg-slate-400'} text-white`}>{r.brand}</span></div>
                      <p className="text-slate-500 flex items-center gap-1 text-sm mt-1 tracking-tight"><MapPin size={14} /> {r.address}, {r.city}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 relative">
                    {canModifyItem(r.authorEmail) && (
                        <>
                            <div className="relative">
                              <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className={`p-2 rounded-lg transition-colors ${isSettingsOpen ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}><Settings size={20} /></button>
                              {isSettingsOpen && (
                                <div className="absolute right-0 mt-3 w-48 bg-white border border-slate-200 rounded-xl shadow-xl z-20 overflow-hidden text-left">
                                  <button onClick={() => setIsDeleteModalOpen(true)} className="w-full text-left px-4 py-3 text-sm text-red-600 hover:bg-red-50 flex items-center gap-2 font-semibold transition-colors"><Trash2 size={14} /> Usuń restaurację</button>
                                </div>
                              )}
                            </div>
                            <button onClick={onEditClick} className="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-bold shadow-md hover:bg-indigo-700 transition-all flex items-center gap-2"><Edit size={16} /> Edytuj Lokal</button>
                        </>
                    )}
                  </div>
                </div>

                <div className="flex gap-8 mt-8 border-b border-slate-100 overflow-x-auto whitespace-nowrap scrollbar-hide text-indigo-950">
                  <DetailTab label="Dokumentacja" count={counts.docs} active={activeDetailTab === 'docs'} icon={FileText} onClick={() => setActiveDetailTab('docs')} />
                  <DetailTab label="Zgłoszenia" count={counts.tickets} active={activeDetailTab === 'tickets'} icon={AlertTriangle} onClick={() => setActiveDetailTab('tickets')} />
                  <DetailTab label="Zadania" count={counts.tasks} active={activeDetailTab === 'tasks'} icon={CheckSquare} onClick={() => setActiveDetailTab('tasks')} />
                  <DetailTab label="Notatki" count={counts.notes} active={activeDetailTab === 'notes'} icon={StickyNote} onClick={() => setActiveDetailTab('notes')} />
                  <DetailTab label="Historia" active={activeDetailTab === 'history'} icon={RotateCcw} onClick={() => setActiveDetailTab('history')} />
                  <DetailTab label="Dane restauracji" active={activeDetailTab === 'info'} icon={Info} onClick={() => setActiveDetailTab('info')} />
                </div>
              </div>

              <div className="mt-6">
                {activeDetailTab === 'docs' && (
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 animate-in fade-in duration-200">
                    {docs.filter(d => d.restaurantId === r.id).map(doc => (
                      <DocItem key={doc.id} title={doc.title} type={doc.type} size={doc.size} url={doc.url} onDelete={() => onDeleteDoc(doc)} onPreview={onPreview} canModify={canModifyItem(doc.authorEmail)} />
                    ))}
                    
                    <label className={`border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center p-6 text-slate-400 hover:border-indigo-300 hover:text-indigo-500 transition-all cursor-pointer group relative overflow-hidden ${isUploadingDoc ? 'pointer-events-none' : ''}`}>
                      <input type="file" multiple className="hidden" onChange={onFileUpload} disabled={isUploadingDoc} />
                      {isUploadingDoc ? (
                        <div className="text-center w-full relative z-10 px-4">
                            <Loader2 size={24} className="mx-auto mb-2 animate-spin text-indigo-500" />
                            <p className="text-[10px] font-bold uppercase tracking-widest text-indigo-950/60 mb-2">Wysyłanie...</p>
                            <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                <div className="bg-indigo-500 h-1.5 transition-all duration-300" style={{ width: `${uploadProgress}%` }}></div>
                            </div>
                        </div>
                      ) : (
                        <div className="text-center group-hover:scale-105 transition-transform">
                            <Plus size={24} className="mx-auto mb-1" />
                            <p className="text-xs font-bold uppercase tracking-widest text-indigo-950/40">Dodaj Dokumenty</p>
                        </div>
                      )}
                    </label>
                  </div>
                )}

                {activeDetailTab === 'tickets' && (
                  <div className="space-y-4 animate-in fade-in duration-200">
                    <div className="flex justify-between items-center px-1">
                      <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest tracking-tighter text-indigo-950/40">Wykaz aktywnych zgłoszeń</h4>
                      <button onClick={onCreateTicket} className="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-indigo-100 transition-colors flex items-center gap-1.5 shadow-sm"><Plus size={14} /> Nowe Zgłoszenie</button>
                    </div>
                    {tickets.filter(t => t.restaurantId === r.id).length > 0 ? (
                      tickets.filter(t => t.restaurantId === r.id).map(t => (
                        <div key={t.id} onClick={() => onOpenTicket(t)} className="cursor-pointer bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex justify-between items-center group text-indigo-950 hover:border-indigo-200 hover:shadow-md transition-all">
                          <div className="flex gap-3 items-start">
                            <div className={`p-2 rounded-lg ${t.priority === 'Wysoki' ? 'bg-red-50 text-red-600' : 'bg-slate-50 text-slate-500'}`}><AlertTriangle size={18} /></div>
                            <div>
                              <div className="flex items-center gap-2"><p className="text-sm font-bold leading-tight group-hover:text-indigo-600 transition-colors">{t.title}</p><span className={`text-[9px] px-1.5 py-0.5 rounded font-black uppercase tracking-tight ${t.status === 'Zakończone' ? 'bg-green-100 text-green-700' : 'bg-indigo-50 text-indigo-700'}`}>{t.status}</span></div>
                              <p className="text-xs text-slate-500 mt-1 leading-relaxed line-clamp-1">{t.description}</p>
                              <div className="flex gap-4 mt-2 items-center">
                                <span className={`text-[10px] font-bold uppercase ${t.priority === 'Wysoki' ? 'text-red-600' : 'text-slate-400'}`}>Priorytet: {t.priority}</span>
                                <span className="text-[10px] text-slate-400 font-medium flex items-center gap-1"><Calendar size={10} /> {t.date}</span>
                              </div>
                            </div>
                          </div>
                          <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all">
                            <button onClick={(e) => { e.stopPropagation(); onShareTicket(t, r.name); }} className="p-2 text-slate-400 hover:text-indigo-600 bg-slate-50 rounded-lg transition-colors" title="Skopiuj link"><Share2 size={16} /></button>
                            <button className="p-2 text-slate-400 hover:text-indigo-600 bg-slate-50 rounded-lg transition-colors" title="Otwórz zgłoszenie"><ExternalLink size={16} /></button>
                          </div>
                        </div>
                      ))
                    ) : (
                      <div className="text-center py-12 bg-white rounded-2xl border border-dashed border-slate-200"><p className="text-slate-400 text-sm italic tracking-tight">Brak aktywnych zgłoszeń dla tego lokalu.</p></div>
                    )}
                  </div>
                )}

                {activeDetailTab === 'tasks' && (
                  <div className="space-y-4 animate-in fade-in duration-200">
                    <div className="flex justify-between items-center px-1">
                      <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest tracking-tighter text-indigo-950/40">Zadania dla personelu</h4>
                      <button onClick={onAddTask} className="bg-green-50 text-green-700 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-green-100 transition-colors flex items-center gap-1.5 shadow-sm"><Plus size={14} /> Nowe Zadanie</button>
                    </div>
                    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                       {tasks.filter(t => t.restaurantId === r.id).length > 0 ? (
                          <div className="divide-y divide-slate-100">
                            {tasks.filter(t => t.restaurantId === r.id).map(t => (
                               <div key={t.id} className={`flex items-center justify-between p-4 group transition-colors ${t.completed ? 'bg-slate-50 opacity-75' : 'bg-white hover:bg-slate-50'}`}>
                                  <div className="flex items-center gap-3">
                                     <button onClick={() => onToggleTask(t)} className={`w-5 h-5 rounded border flex items-center justify-center transition-colors ${t.completed ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 text-transparent hover:border-green-400'}`}><CheckCircle2 size={14} /></button>
                                     <div>
                                        <p className={`text-sm font-bold ${t.completed ? 'text-slate-500 line-through' : 'text-indigo-950'}`}>{t.title}</p>
                                        <p className="text-[10px] text-slate-400 font-medium flex items-center gap-1"><Calendar size={10} /> Termin: {t.deadline}</p>
                                     </div>
                                  </div>
                                  <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                     {canModifyItem(t.authorEmail) && (
                                         <>
                                            <button onClick={() => onEditTask(t)} className="p-1.5 text-slate-400 hover:text-indigo-600 bg-slate-50 rounded-lg transition-colors" title="Edytuj"><Pencil size={14} /></button>
                                            <button onClick={() => onDeleteTask(t)} className="p-1.5 text-slate-400 hover:text-red-600 bg-slate-50 rounded-lg transition-colors" title="Usuń"><Trash2 size={14} /></button>
                                         </>
                                     )}
                                  </div>
                               </div>
                            ))}
                          </div>
                       ) : (
                          <div className="text-center py-12"><p className="text-slate-400 text-sm italic tracking-tight">Brak zadań. Dodaj nowe zadanie dla lokalu.</p></div>
                       )}
                    </div>
                  </div>
                )}

                {activeDetailTab === 'notes' && (
                  <div className="space-y-4 animate-in fade-in duration-200">
                    <div className="flex justify-between items-center px-1">
                      <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest text-indigo-900/40 text-indigo-950/40">Wspólne Notatki</h4>
                      <button onClick={() => setIsNoteModalOpen(true)} className="bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-colors hover:bg-amber-200"><Plus size={14} /> Nowa Notatka</button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {notes.filter(n => n.restaurantId === r.id).map(note => (
                        <div key={note.id} className="bg-amber-50 p-4 rounded-xl border border-amber-100 shadow-sm group relative text-indigo-950">
                          <div className="flex justify-between items-start mb-2 pr-16">
                              <div>
                                  <h5 className="font-bold text-amber-900 text-sm">{note.title}</h5>
                                  <span className="text-[9px] font-medium text-amber-600 block leading-none mt-1">Autor: {note.authorEmail || 'Nieznany'}</span>
                              </div>
                          </div>
                          
                          {canModifyItem(note.authorEmail) && (
                              <div className="absolute top-3 right-3 flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                <button onClick={() => onEditNote(note)} className="p-1.5 bg-amber-100 text-amber-600 hover:bg-indigo-600 hover:text-white rounded-lg transition-all shadow-sm" title="Edytuj"><Pencil size={12} /></button>
                                <button onClick={() => onDeleteNote(note)} className="p-1.5 bg-amber-100 text-amber-400 hover:bg-red-600 hover:text-white rounded-lg transition-all shadow-sm" title="Usuń"><Trash2 size={12} /></button>
                              </div>
                          )}
                          <p className="text-xs text-amber-800 leading-relaxed break-words whitespace-pre-wrap mt-2">{note.content}</p>
                        </div>
                      ))}
                      {notes.filter(n => n.restaurantId === r.id).length === 0 && <div className="col-span-2 text-center py-8"><p className="text-slate-400 text-sm italic">Brak notatek dla tego lokalu.</p></div>}
                    </div>
                  </div>
                )}

                {activeDetailTab === 'history' && (
                  <div className="space-y-4 animate-in fade-in duration-200">
                     <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest tracking-tighter text-indigo-950/40 px-1">Historia Aktywności (Ostatnie)</h4>
                     <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                        {historyLogs.filter(h => h.restaurantId === r.id).length > 0 ? (
                           <div className="space-y-6 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-200 before:to-transparent">
                              {historyLogs.filter(h => h.restaurantId === r.id).sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 50).map(log => {
                                 const getIcon = (type) => {
                                     if(type==='ticket') return <AlertTriangle size={14} className="text-red-500"/>;
                                     if(type==='task') return <CheckSquare size={14} className="text-green-500"/>;
                                     if(type==='note') return <StickyNote size={14} className="text-amber-500"/>;
                                     if(type==='doc') return <FileText size={14} className="text-blue-500"/>;
                                     return <Store size={14} className="text-indigo-500"/>;
                                 };
                                 const parsedDate = new Date(log.date);
                                 return (
                                 <div key={log.id} className="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group is-active">
                                    <div className="flex items-center justify-center w-10 h-10 rounded-full border border-white bg-slate-50 text-slate-500 shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2">{getIcon(log.type)}</div>
                                    <div className="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white p-4 rounded-xl border border-slate-100 shadow-sm relative">
                                       {canModifyItem(log.authorEmail) && (
                                           <button onClick={() => onDeleteLog(log.id)} className="absolute top-2 right-2 p-1 text-slate-300 hover:text-red-600 transition-colors opacity-0 group-hover:opacity-100" title="Usuń z historii">
                                               <Trash2 size={12} />
                                           </button>
                                       )}
                                       <div className="flex items-center justify-between space-x-2 mb-1 pr-4">
                                          <div className="font-bold text-slate-800 text-xs whitespace-pre-wrap">{log.description}</div>
                                          <time className="font-caveat font-medium text-[10px] text-slate-400">{parsedDate.toLocaleDateString()} {parsedDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</time>
                                       </div>
                                    </div>
                                 </div>
                              )})}
                           </div>
                        ) : (
                           <div className="text-center py-8"><p className="text-slate-400 text-sm italic">Brak zarejestrowanej aktywności.</p></div>
                        )}
                     </div>
                  </div>
                )}

                {activeDetailTab === 'info' && (
                  <div className="bg-white p-8 rounded-2xl border border-slate-200 animate-in fade-in duration-200 shadow-sm">
                     <div className="grid grid-cols-1 md:grid-cols-2 gap-12 text-indigo-950">
                       <div className="space-y-6">
                          <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest border-b border-slate-50 pb-2">Podstawowe dane</h4>
                          <InfoRow icon={Building2} label="ID" value={r.id} />
                          <InfoRow icon={Store} label="Marka" value={r.brand} />
                          <InfoRow icon={MapPin} label="Miasto" value={r.city} />
                          <InfoRow icon={MapPin} label="Adres" value={r.address} />
                       </div>
                       <div className="space-y-6">
                          <h4 className="text-xs font-black text-slate-400 uppercase tracking-widest border-b border-slate-50 pb-2 text-indigo-950/40">Sieć i Kontakt</h4>
                          <InfoRow icon={Globe} label="IP" value={r.ip || '-'} />
                          <InfoRow icon={Mail} label="E-mail" value={r.email || '-'} />
                       </div>
                     </div>
                     <div className="mt-12 pt-8 border-t border-slate-100">
                       <div className="flex items-center justify-between mb-4">
                         <div className="flex items-center gap-2"><Sparkles size={20} className="text-indigo-600" /><h4 className="text-lg font-black text-indigo-950">AI Manager Report</h4></div>
                         <button onClick={generateReport} disabled={loading} className="flex items-center gap-2 px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold hover:bg-indigo-700 transition-all shadow-md disabled:opacity-50">
                           {loading ? <Loader2 size={14} className="animate-spin" /> : <Wand2 size={14} />} Generuj Raport AI
                         </button>
                       </div>
                       {report ? (
                         <div className="bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100 animate-in slide-in-from-bottom-2"><div className="text-sm text-indigo-900 leading-relaxed font-medium">{report}</div></div>
                       ) : (
                         <div className="text-center py-8 bg-slate-50 border border-dashed border-slate-200 rounded-2xl"><p className="text-slate-400 text-xs italic">Kliknij przycisk, aby AI przeanalizowało stan operacyjny lokalu.</p></div>
                       )}
                     </div>
                  </div>
                )}
              </div>
            </div>
          );
        };

        // --- SUB-COMPONENTS FOR MODALS ---
        const RestaurantModal = ({ title, data, setData, onSave, onCancel, isSubmitting }) => (
          <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onCancel} />
            <div className="bg-white rounded-3xl p-8 w-full max-w-lg relative shadow-2xl animate-in zoom-in duration-200 max-h-[90vh] overflow-y-auto scrollbar-hide text-indigo-950">
              <h3 className="text-xl font-black mb-6 tracking-tight text-indigo-900">{title}</h3>
              <form onSubmit={onSave} className="space-y-4">
                <div className="grid grid-cols-2 gap-4">
                  <div className="col-span-2">
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Nazwa Lokalu</label>
                    <input required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm" value={data.name || ''} onChange={e => setData({...data, name: e.target.value})} />
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Marka</label>
                    <select className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={data.brand || 'KFC'} onChange={e => setData({...data, brand: e.target.value})}>
                      {Object.keys(BRANDS).map(b => <option key={b} value={b}>{b}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Miasto</label>
                    <input required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={data.city || ''} onChange={e => setData({...data, city: e.target.value})} />
                  </div>
                  <div className="col-span-2">
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Dokładny Adres</label>
                    <input required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={data.address || ''} onChange={e => setData({...data, address: e.target.value})} />
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Adres IP</label>
                    <input className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={data.ip || ''} onChange={e => setData({...data, ip: e.target.value})} />
                  </div>
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">E-mail</label>
                    <input type="email" className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={data.email || ''} onChange={e => setData({...data, email: e.target.value})} />
                  </div>
                </div>
                <div className="flex gap-3 pt-6">
                  <button type="button" onClick={onCancel} className="flex-1 py-3 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-xl transition-colors">Anuluj</button>
                  <button type="submit" disabled={isSubmitting} className="flex-1 py-3 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 shadow-lg transition-all active:scale-95 disabled:opacity-50 flex justify-center items-center gap-2">
                    {isSubmitting ? <Loader2 size={16} className="animate-spin" /> : 'Zapisz'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        );

        const TaskModal = ({ title, data, setData, onSave, onCancel, isEdit, isSubmitting }) => (
          <div className="fixed inset-0 z-[120] flex items-center justify-center p-4">
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onCancel} />
            <div className="bg-white rounded-3xl p-8 w-full max-w-md relative shadow-2xl animate-in zoom-in duration-200 text-indigo-950">
              <h3 className="text-xl font-black mb-6 tracking-tight text-indigo-900">{title}</h3>
              <form onSubmit={onSave} className="space-y-4">
                <div>
                  <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider">Tytuł Zadania</label>
                  <input required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={data.title || ''} onChange={e => setData({...data, title: e.target.value})} />
                </div>
                <div>
                  <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider">Termin wykonania</label>
                  <input type="date" required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={data.deadline || ''} onChange={e => setData({...data, deadline: e.target.value})} />
                </div>
                {isEdit && (
                   <div className="flex items-center gap-3 mt-4 p-3 bg-slate-50 rounded-xl">
                      <input type="checkbox" id="task-completed" className="w-4 h-4 rounded text-indigo-600" checked={data.completed || false} onChange={e => setData({...data, completed: e.target.checked})} />
                      <label htmlFor="task-completed" className="text-sm font-bold text-slate-700 cursor-pointer">Oznacz jako wykonane</label>
                   </div>
                )}
                <div className="flex gap-3 pt-6 border-t border-slate-100">
                  <button type="button" onClick={onCancel} className="flex-1 py-3 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-xl transition-colors">Anuluj</button>
                  <button type="submit" disabled={isSubmitting} className="flex-1 py-3 text-sm font-bold text-white bg-green-600 rounded-xl hover:bg-green-700 shadow-lg transition-all disabled:opacity-50 flex justify-center items-center gap-2">
                    {isSubmitting ? <Loader2 size={16} className="animate-spin" /> : 'Zapisz zadanie'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        );

        // ==========================================
        // GŁÓWNA LOGIKA APLIKACJI - FIREBASE
        // ==========================================

        const App = () => {
          const [user, setUser] = useState(null);
          const [systemUsers, setSystemUsers] = useState([]);
          const [currentUserProfile, setCurrentUserProfile] = useState(null);
          const [isConnecting, setIsConnecting] = useState(true);
          const [dbError, setDbError] = useState(null);
          
          const [isSubmittingAction, setIsSubmittingAction] = useState(false);
          const [isUploadingDoc, setIsUploadingDoc] = useState(false);
          const [uploadProgress, setUploadProgress] = useState(0);

          const [isAuthMode, setIsAuthMode] = useState(true);
          const [authEmail, setAuthEmail] = useState('');
          const [authPassword, setAuthPassword] = useState('');
          const [rememberMe, setRememberMe] = useState(true); 
          const [authErrorLocal, setAuthErrorLocal] = useState('');
          const [isAuthLoading, setIsAuthLoading] = useState(false);

          const [activeTab, setActiveTab] = useState('dashboard');
          const [restaurants, setRestaurants] = useState([]);
          const [tickets, setTickets] = useState([]);
          const [tasks, setTasks] = useState([]);
          const [notes, setNotes] = useState([]);
          const [docs, setDocs] = useState([]);
          const [attachments, setAttachments] = useState([]);
          const [historyLogs, setHistoryLogs] = useState([]); 
          const [searchQuery, setSearchQuery] = useState('');
          const [toast, setToast] = useState(null);
          const [toastType, setToastType] = useState('info'); 
          
          const [selectedRestaurant, setSelectedRestaurant] = useState(null);
          const [selectedTicket, setSelectedTicket] = useState(null); 
          const [activeDetailTab, setActiveDetailTab] = useState('docs');
          
          const [previewFile, setPreviewFile] = useState(null);
          
          const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
          const [isSettingsOpen, setIsSettingsOpen] = useState(false);
          
          const [isNoteModalOpen, setIsNoteModalOpen] = useState(false);
          const [isEditNoteModalOpen, setIsEditNoteModalOpen] = useState(false);
          const [noteToDelete, setNoteToDelete] = useState(null);
          
          const [isAddRestaurantModalOpen, setIsAddRestaurantModalOpen] = useState(false);
          const [isEditRestaurantModalOpen, setIsEditRestaurantModalOpen] = useState(false);

          const [isAddTaskModalOpen, setIsAddTaskModalOpen] = useState(false);
          const [isEditTaskModalOpen, setIsEditTaskModalOpen] = useState(false);
          const [taskToDelete, setTaskToDelete] = useState(null);
          
          const [isPasswordModalOpen, setIsPasswordModalOpen] = useState(false);
          const [passwordUser, setPasswordUser] = useState(null);
          const [newAdminPassword, setNewAdminPassword] = useState('');

          const [newNote, setNewNote] = useState({ title: '', content: '' });
          const [editNoteData, setEditNoteData] = useState(null);
          
          const [newRestaurant, setNewRestaurant] = useState({ name: '', brand: 'KFC', city: '', address: '', ip: '', email: '' });
          const [editRestaurantData, setEditRestaurantData] = useState(null);
          
          const [newTaskData, setNewTaskData] = useState({ title: '', deadline: new Date().toISOString().split('T')[0], completed: false });
          const [editTaskData, setEditTaskData] = useState(null);
          
          const [resSortConfig, setResSortConfig] = useState({ key: 'name', direction: 'asc' });
          const [ticketSortConfig, setTicketSortConfig] = useState({ key: 'date', direction: 'desc' });
          const [columnFilters, setColumnFilters] = useState({ brand: '', name: '', city: '' });

          useEffect(() => {
            setIsSettingsOpen(false);
          }, [activeTab, selectedRestaurant, activeDetailTab]);

          const getPublicRef = (collectionName) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collectionName);

          useEffect(() => {
            if (!firebaseConfig) {
                setDbError("Brak pliku config.js lub błędna konfiguracja!");
                setIsConnecting(false);
                return;
            }
            if (!auth) {
                setDbError("Brak poprawnej inicjalizacji Firebase.");
                setIsConnecting(false);
                return;
            }

            const unsubscribe = auth.onAuthStateChanged(async (currentUser) => {
              setUser(currentUser);
              
              if (currentUser && db) {
                  try {
                      const userRef = getPublicRef('users').doc(currentUser.uid);
                      const doc = await userRef.get();
                      
                      if (!doc.exists) {
                          const allUsers = await getPublicRef('users').limit(1).get();
                          const role = allUsers.empty ? 'Administrator' : 'Serwisant';
                          await userRef.set({
                              email: currentUser.email,
                              role: role,
                              createdAt: new Date().toISOString()
                          });
                      }
                  } catch (e) {
                      console.error("Błąd tworzenia profilu użytkownika:", e);
                  }
              }

              setIsConnecting(false);
            });
            
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user || !db) return;
            
            const handleFirebaseError = (err) => {
                console.error("Firebase listen error", err);
                if(err.code === 'permission-denied') showToast("BRAK UPRAWNIEŃ FIRESTORE!", "error");
            };

            const unsubUsers = getPublicRef('users').onSnapshot(snap => setSystemUsers(snap.docs.map(d => ({ id: d.id, ...d.data() }))), handleFirebaseError);
            const unsubRes = getPublicRef('restaurants').onSnapshot(snap => setRestaurants(snap.docs.map(d => ({ id: d.id, ...d.data() }))), handleFirebaseError);
            const unsubTickets = getPublicRef('tickets').onSnapshot(snap => setTickets(snap.docs.map(d => ({ id: d.id, ...d.data() }))), handleFirebaseError);
            const unsubTasks = getPublicRef('tasks').onSnapshot(snap => setTasks(snap.docs.map(d => ({ id: d.id, ...d.data() }))), handleFirebaseError);
            const unsubDocs = getPublicRef('docs').onSnapshot(snap => setDocs(snap.docs.map(d => ({ id: d.id, ...d.data() }))), handleFirebaseError);
            const unsubAtt = getPublicRef('attachments').onSnapshot(snap => setAttachments(snap.docs.map(d => ({ id: d.id, ...d.data() }))), handleFirebaseError);
            const unsubHist = getPublicRef('history').onSnapshot(snap => setHistoryLogs(snap.docs.map(d => ({ id: d.id, ...d.data() }))), handleFirebaseError);
            const unsubNotes = getPublicRef('notes').onSnapshot(snap => setNotes(snap.docs.map(d => ({ id: d.id, ...d.data() }))), handleFirebaseError);

            return () => { unsubUsers(); unsubRes(); unsubTickets(); unsubTasks(); unsubNotes(); unsubDocs(); unsubAtt(); unsubHist(); };
          }, [user]);

          useEffect(() => {
            if (systemUsers.length > 0 && user) {
                setCurrentUserProfile(systemUsers.find(u => u.id === user.uid));
            }
          }, [systemUsers, user]);

          // --- LOGIKA UPRAWNIEŃ (RBAC) ---
          const canModifyItem = (itemAuthorEmail) => {
             if (!currentUserProfile || !user) return false;
             if (currentUserProfile.role === 'Administrator') return true;
             if (itemAuthorEmail === user.email) return true;
             if (!itemAuthorEmail) return true; 
             return false;
          };

          const logActivity = async (restaurantId, type, description, ticketId = null) => {
             if (!db || !user) return;
             try {
                 const authorData = currentUserProfile?.email ? `${currentUserProfile.email} (${currentUserProfile.role})` : user.email;
                 const payload = {
                     restaurantId: restaurantId || 'global',
                     type, 
                     description: `${authorData} - ${description}`,
                     date: new Date().toISOString(),
                     authorEmail: user.email
                 };
                 if (ticketId) payload.ticketId = ticketId;
                 
                 await getPublicRef('history').add(payload);
             } catch(e) { console.error("History log fail", e); }
          };

          const handleAuthSubmit = async (e) => {
            e.preventDefault();
            setIsAuthLoading(true);
            setAuthErrorLocal('');
            try {
              await auth.setPersistence(rememberMe ? firebase.auth.Auth.Persistence.LOCAL : firebase.auth.Auth.Persistence.SESSION);
              if (isAuthMode) {
                await auth.signInWithEmailAndPassword(authEmail, authPassword);
              } else {
                await auth.createUserWithEmailAndPassword(authEmail, authPassword);
              }
            } catch (err) {
              setAuthErrorLocal(err.message);
            } finally {
              setIsAuthLoading(false);
            }
          };

          const handleLogout = async () => { try { await auth.signOut(); } catch (err) { console.error(err); } };
          const showToast = (msg, type = 'info') => { setToast(msg); setToastType(type); setTimeout(() => setToast(null), 5000); };
          const handleResetFilters = () => { setColumnFilters({ brand: '', name: '', city: '' }); setSearchQuery(''); };

          const handleFirebaseWriteError = (err) => {
              if(err.code === 'permission-denied') showToast("Firebase zablokował zapis!", "error");
              else showToast("Błąd zapisu: " + err.message, "error");
          };

          const handleRoleChange = async (userId, newRole) => {
              if(!db || !currentUserProfile || currentUserProfile.role !== 'Administrator') return;
              try {
                  await getPublicRef('users').doc(userId).update({ role: newRole });
                  showToast("Zmieniono uprawnienia użytkownika.");
              } catch(err) { handleFirebaseWriteError(err); }
          };

          const handleSendPasswordResetEmail = async (emailToReset) => {
              setIsSubmittingAction(true);
              try {
                  await auth.sendPasswordResetEmail(emailToReset);
                  showToast(`Wysłano oficjalny link resetujący na e-mail: ${emailToReset}`);
              } catch (e) {
                  showToast("Błąd wysyłania linku: " + e.message, "error");
              } finally {
                  setIsSubmittingAction(false);
              }
          };

          const handleSimulatePasswordChange = async (e) => {
              e.preventDefault();
              if(!newAdminPassword || !passwordUser) return;
              setIsSubmittingAction(true);
              
              try {
                  await getPublicRef('users').doc(passwordUser.id).update({
                      adminRequestedNewPassword: newAdminPassword,
                      lastPasswordChangeSimulated: new Date().toISOString()
                  });
                  await logActivity('global', 'system', `Administrator zaktualizował profil bezpieczeństwa dla: ${passwordUser.email}`);
                  showToast("Zmiana zapisana w bazie (Wymagane zew. narzędzia do wymuszenia w Auth).", "info");
                  setIsPasswordModalOpen(false);
                  setNewAdminPassword('');
              } catch (e) {
                  handleFirebaseWriteError(e);
              } finally {
                  setIsSubmittingAction(false);
              }
          };

          const handleAdminForceDelete = async (collection, item) => {
              const label = item.title || item.name || 'Wybrany wpis';
              if(!window.confirm(`[ZARZĄDZANIE BAZĄ DANYCH]\nCzy na pewno chcesz bezpowrotnie usunąć wpis: "${label}"?`)) return;
              
              setIsSubmittingAction(true);
              try {
                  await getPublicRef(collection).doc(item.id).delete();
                  await logActivity('global', 'system', `[SUPER ADMIN] Wymuszone usunięcie z kolekcji ${collection}: ${label}`);
                  showToast(`Usunięto "${label}" z bazy danych.`);
              } catch(e) {
                  handleFirebaseWriteError(e);
              } finally {
                  setIsSubmittingAction(false);
              }
          };

          const handleOpenTicket = (ticket) => {
              const tRest = restaurants.find(r => r.id === ticket.restaurantId);
              if(tRest) setSelectedRestaurant(tRest);
              setSelectedTicket(ticket);
              setActiveTab('ticket_detail');
          };

          const handleAddRestaurant = async (e) => {
            e.preventDefault();
            if(!db || isSubmittingAction) return;

            const newName = (newRestaurant.name || '').trim();
            if (restaurants.some(r => r.name.trim().toLowerCase() === newName.toLowerCase())) {

          const handleAddTicketUpdateWithFiles = async (ticketId, text, files = []) => {

                  const updateDate = new Date().toISOString();
                  let hasAttachedFiles = false;

                  if (files.length > 0 && storage) {
                      setIsUploadingDoc(true);
                      setUploadProgress(0);
                      
                      for (let i = 0; i < files.length; i++) {
                          const file = files[i];
                          const fileName = `${Date.now()}_${file.name}`;
                          const storagePath = `artifacts/${appId}/public/ticket_attachments/${ticketId}/${fileName}`;
                          const fileRef = storage.ref().child(storagePath);
                          
                          const uploadTask = fileRef.put(file);

                          await new Promise((resolve, reject) => {
                              uploadTask.on('state_changed', 
                                  (snapshot) => {
                                      const fileProgress = snapshot.bytesTransferred / snapshot.totalBytes;
                                      setUploadProgress(((i + fileProgress) / files.length) * 100);
                                  }, 
                                  (error) => { showToast(`Błąd wysyłania: ${file.name}`, "error"); reject(error); }, 
                                  async () => {

                                              restaurantId: selectedRestaurant?.id || null, date: new Date().toISOString(),
                                              authorEmail: user.email
                                          });
                                          resolve();
                                      } catch (err) { reject(err); }
                                  }
                              );

                      setIsUploadingDoc(false);
                      setUploadProgress(0);

                  if (text.trim() || hasAttachedFiles) {
                      const authorInfo = currentUserProfile ? `${currentUserProfile.email} (${currentUserProfile.role})` : user.email;

                          id: updateId, text: text.trim(), date: updateDate, author: authorInfo, authorEmail: user.email, hasAttachments: hasAttachedFiles
                      };
                      
                      await getPublicRef('tickets').doc(ticketId).update({
                          updates: firebase.firestore.FieldValue.arrayUnion(newUpdate)
                      });
                      
                      let historyMsg = `Dodano nowy wpis do zgłoszenia:\n"${text}"`;
                      if (hasAttachedFiles) historyMsg += `\n[Oraz załączono pliki: ${files.length}]`;
                      
                      await logActivity(selectedRestaurant?.id || 'global', 'ticket', historyMsg, ticketId);
                      showToast("Wpis został dodany.");
                  }
              } catch (err) { 
                  handleFirebaseWriteError(err); 
                  setIsUploadingDoc(false);
                  setUploadProgress(0);
              } finally { setIsSubmittingAction(false); }
          };

          // --- OPTYMALIZACJA UPLOADU (ZOPTYMALIZOWANY MULTI-UPLOAD DOKUMENTÓW) ---
          const handleFileUpload = async (e) => {

             setIsUploadingDoc(true);
             setIsSubmittingAction(true);
             setUploadProgress(0);

             try {

                     const uploadTask = fileRef.put(file);

                               const fileProgress = snapshot.bytesTransferred / snapshot.totalBytes;
                               setUploadProgress(((i + fileProgress) / files.length) * 100);
