        const ClipboardList = memo((p) => <Svg {...p}><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></Svg>);
        const BookOpen = memo((p) => <Svg {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Svg>);

        const Settings = memo((p) => <Svg {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></Svg>);
        const FileText = memo((p) => <Svg {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></Svg>);
        const ImageIcon = memo((p) => <Svg {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></Svg>);
        const CheckSquare = memo((p) => <Svg {...p}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></Svg>);
        const BarChart3 = memo((p) => <Svg {...p}><path d="M3 3v18h18"/><rect x="7" y="10" width="4" height="7"/><rect x="15" y="4" width="4" height="13"/></Svg>);
        const Download = memo((p) => <Svg {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Svg>);

        const ArrowUpDown = memo((p) => <Svg {...p}><path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/></Svg>);
        const Save = memo((p) => <Svg {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></Svg>);
        const Info = memo((p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></Svg>);
        const Building2 = memo((p) => <Svg {...p}><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></Svg>);
        const Globe = memo((p) => <Svg {...p}><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></Svg>);
        const Mail = memo((p) => <Svg {...p}><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Svg>);
        const Edit = memo((p) => <Svg {...p}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Svg>);
        const Pencil = memo((p) => <Svg {...p}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></Svg>);
        const Share2 = memo((p) => <Svg {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></Svg>);
        const Eye = memo((p) => <Svg {...p}><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></Svg>);
        const RotateCcw = memo((p) => <Svg {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Svg>);
        const Sparkles = memo((p) => <Svg {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Svg>);
        const Loader2 = memo((p) => <Svg {...p} className={`animate-spin ${p.className||''}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Svg>);
        const Wand2 = memo((p) => <Svg {...p}><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></Svg>);
        const ChevronUp = memo((p) => <Svg {...p}><polyline points="18 15 12 9 6 15"/></Svg>);
        const ChevronDown = memo((p) => <Svg {...p}><polyline points="6 9 12 15 18 9"/></Svg>);
        const LogOut = memo((p) => <Svg {...p}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></Svg>);
        const ArchiveIcon = memo((p) => <Svg {...p}><rect width="20" height="5" x="2" y="4" rx="1"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></Svg>);
        const MessageSquare = memo((p) => <Svg {...p}><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></Svg>);
        const Paperclip = memo((p) => <Svg {...p}><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></Svg>);
        const Users = memo((p) => <Svg {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Svg>);
        const ShieldCheck = memo((p) => <Svg {...p}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></Svg>);
        const Key = memo((p) => <Svg {...p}><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></Svg>);

        // ==========================================
        // DANE POMOCNICZE
        // ==========================================
        const BRANDS = {
          'KFC': { color: 'bg-red-600', text: 'text-white', light: 'bg-red-50' },
          'Pizza Hut': { color: 'bg-red-800', text: 'text-white', light: 'bg-red-50' },
          'Burger King': { color: 'bg-blue-700', text: 'text-white', light: 'bg-blue-50' },
          'Starbucks': { color: 'bg-green-800', text: 'text-white', light: 'bg-green-50' },
          'Popeyes': { color: 'bg-orange-500', text: 'text-white', light: 'bg-orange-50' }
        };

        const apiKey = "";
        async function callGemini(userQuery, systemPrompt = "Jesteś asystentem technicznym w sieci restauracji.") {
          if(!apiKey) return "Aby korzystać z AI, skonfiguruj klucz API.";
          try {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
              const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
              };
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });
              if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
              const result = await response.json();
              return result.candidates?.[0]?.content?.parts?.[0]?.text || "Brak odpowiedzi od AI.";
          } catch(err) {
              return "Błąd połączenia z modelem AI.";
          }
        }

        // ==========================================
        // KOMPONENTY BEZSTANOWE I WIDżETY
        // ==========================================
        const NavItem = memo(({ icon: IconComponent, label, active, onClick }) => (
          <button onClick={onClick} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all group ${active ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'text-slate-400 hover:bg-indigo-50 hover:text-indigo-600'}`}>
            <IconComponent size={20} className="shrink-0" />
            <span className="text-sm font-bold hidden md:block whitespace-nowrap">{label}</span>
          </button>
        ));

        const StatCard = memo(({ title, value, icon: IconComponent, color, onClick }) => {
          const colors = { blue: 'text-blue-600 bg-blue-50', red: 'text-red-600 bg-red-50', green: 'text-green-600 bg-green-50', orange: 'text-orange-600 bg-orange-50' };
          return (
            <div 
              onClick={onClick}
              className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex items-center justify-between text-indigo-950 cursor-pointer hover:border-indigo-200 hover:shadow-md transition-all active:scale-95 group"
            >
              <div>
                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1 tracking-tight tracking-tighter leading-none group-hover:text-indigo-500 transition-colors">{title}</p>
                <p className="text-2xl font-black tracking-tight">{value}</p>
              </div>
              <div className={`p-3 rounded-xl ${colors[color]} group-hover:scale-110 transition-transform`}><IconComponent size={24} /></div>
            </div>
          );
        });

        const DetailTab = memo(({ label, count, active, icon: IconComponent, onClick }) => (
          <button onClick={onClick} className={`flex items-center gap-2 pb-4 px-1 text-sm font-bold transition-all border-b-2 whitespace-nowrap ${active ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>
            <IconComponent size={16} /> {label}
            {count !== undefined && <span className={`ml-1 text-[10px] px-1.5 py-0.5 rounded-full ${active ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}>{count}</span>}
          </button>
        ));

        const DocItem = memo(({ title, size, type, url, onDelete, onPreview, canModify = true }) => {
          const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'heic'].includes(type?.toLowerCase());
          return (
            <div 
              className="bg-white p-3 border border-slate-100 rounded-xl flex items-center gap-4 hover:border-indigo-200 transition-all shadow-sm group text-indigo-950 cursor-pointer" 
              onClick={() => onPreview({title, type, url})}
            >
              <div className={`relative z-10 w-12 h-12 shrink-0 rounded-lg flex items-center justify-center font-black text-[10px] uppercase overflow-hidden ${!isImage && type === 'pdf' ? 'bg-red-50 text-red-600' : 'bg-indigo-50 text-indigo-600'}`}>
                  {isImage ? (
                      <img src={url} alt={title} className="w-full h-full object-cover" />
                  ) : (
                      type ? type.substring(0,4) : 'DOC'
                  )}
              </div>
              <div className="flex-1 overflow-hidden relative z-10 pointer-events-none">
                <p className="text-xs font-bold truncate pr-6 text-slate-700 group-hover:text-indigo-600 transition-colors">{title}</p>
                <p className="text-[10px] text-slate-400 mt-0.5 tracking-tight tracking-tighter leading-none">{size}</p>
              </div>
              <div className="relative z-10 flex gap-1 items-center bg-white rounded-lg shadow-sm border border-slate-100 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button onClick={(e) => { e.stopPropagation(); onPreview({title, type, url}); }} className="p-2 text-slate-400 hover:text-indigo-600 transition-colors" title="Podgląd pliku">
                      <Eye size={14} />
                  </button>
                  {canModify && (
                      <>
                          <div className="w-px h-4 bg-slate-200"></div>
                          <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-2 text-slate-400 hover:text-red-600 transition-colors" title="Usuń dokument">
                              <Trash2 size={14} />
                          </button>
                      </>
                  )}
              </div>
            </div>
          );
        });

        const AttachmentItem = memo(({ att, onDelete, onPreview, canModify = true }) => {
            const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'heic'].includes(att.type?.toLowerCase());
            return (
                <div 
                    className="relative group w-full rounded-xl overflow-hidden border border-slate-200 shadow-sm bg-slate-50 aspect-square flex flex-col cursor-pointer shrink-0"
                    onClick={() => onPreview({title: att.title, type: att.type, url: att.url})}
                >
                    <div className="block w-full h-full">
                        {isImage ? (
                            <img src={att.url} alt={att.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                        ) : (
                            <div className="w-full h-full flex flex-col items-center justify-center p-2 text-center text-slate-500 group-hover:bg-slate-100 transition-colors">
                                {att.type === 'pdf' ? <FileText size={24} className="mb-2 text-red-400" /> : <FileText size={24} className="mb-2 text-indigo-400" />}
                                <span className="text-[9px] font-bold uppercase truncate w-full px-1">{att.title}</span>
                            </div>
                        )}
                    </div>
                    {canModify && (
                        <div className="absolute top-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity z-10 flex gap-1">
                            <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-1.5 bg-white/90 text-red-600 rounded-lg shadow-sm hover:bg-red-50 backdrop-blur" title="Usuń załącznik">
                                <Trash2 size={12} />
                            </button>
                        </div>
                    )}
                </div>
            );
        });

        const InfoRow = memo(({ icon: IconComponent, label, value }) => (
          <div className="flex items-center gap-4">
            <div className="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center text-slate-400"><IconComponent size={16} /></div>
            <div className="flex-1">
              <p className="text-[10px] font-bold text-slate-400 uppercase leading-none mb-1 tracking-tight tracking-tighter">{label}</p>
              <p className="text-sm font-semibold text-slate-700 break-all leading-tight">{value}</p>
            </div>
          </div>
        ));

        // ==========================================
        // KOMPONENT WIDOKU PODGLĄDU PLIKU
        // ==========================================
        const FilePreviewModal = ({ file, onClose }) => {
            if (!file) return null;
            const isImage = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'heic'].includes(file.type?.toLowerCase());
            const isPdf = file.type?.toLowerCase() === 'pdf';

            useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => { document.body.style.overflow = 'auto'; };
            }, []);

            return (
                <div className="fixed inset-0 z-[250] flex items-center justify-center p-2 md:p-8">
                    <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm" onClick={onClose} />
                    <div className="bg-white rounded-2xl w-full max-w-6xl h-[95vh] md:h-full max-h-[90vh] flex flex-col relative z-10 overflow-hidden shadow-2xl animate-in zoom-in-95 duration-200">
                        <div className="flex items-center justify-between p-4 border-b border-slate-100 bg-slate-50 shrink-0">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2 truncate pr-4">
                                {isPdf ? <FileText size={18} className="text-red-500 shrink-0"/> : <ImageIcon size={18} className="text-indigo-500 shrink-0"/>}
                                <span className="truncate">{file.title}</span>
                            </h3>
                            <div className="flex gap-2 shrink-0">
                                <a href={file.url} target="_blank" rel="noopener noreferrer" className="p-2 text-slate-500 hover:text-indigo-600 hover:bg-slate-200 rounded-lg transition-colors flex items-center gap-1" title="Pobierz lub otwórz w nowej karcie">
                                    <ExternalLink size={18} /> <span className="text-xs font-bold hidden sm:inline">Nowa karta</span>
                                </a>
                                <button onClick={onClose} className="p-2 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Zamknij">
                                    <X size={18} />
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 bg-slate-200/50 relative overflow-hidden flex items-center justify-center p-2 md:p-6">
                            {isImage && <img src={file.url} alt={file.title} className="max-w-full max-h-full object-contain rounded-lg shadow-sm" />}
                            {isPdf && <iframe src={`${file.url}#view=FitH`} className="w-full h-full rounded-xl shadow-sm border-0 bg-white" title={file.title} />}
                            {!isImage && !isPdf && (
                                <div className="text-center text-slate-500 p-8 bg-white rounded-2xl shadow-sm">
                                    <FileText size={48} className="mx-auto mb-4 text-slate-300" />
                                    <p className="font-medium mb-4">Brak wbudowanego podglądu dla tego typu pliku.</p>
                                    <a href={file.url} target="_blank" rel="noopener noreferrer" className="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-colors inline-block shadow-lg">Pobierz plik</a>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // KOMPONENTY WIDOKÓW
        // ==========================================
        
        const AdminView = memo(({ 
            usersList, restaurants, tickets, notes, historyLogs,
            onRoleChange, onOpenPasswordModal, onForceDelete 
        }) => {
            const [adminTab, setAdminTab] = useState('users');

            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                    <div className="flex justify-between items-end mb-4">
                        <div>
                            <h2 className="text-xl font-black tracking-tight text-indigo-950">Panel Administratora</h2>
                            <p className="text-slate-500 text-xs">Globalny wgląd w bazę danych i pełne zarządzanie systemem</p>
                        </div>
                    </div>

                    <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm flex flex-col">
                        <div className="flex bg-slate-50 border-b border-slate-200 overflow-x-auto scrollbar-hide">
                            <button onClick={() => setAdminTab('users')} className={`px-6 py-4 text-xs font-black uppercase tracking-widest whitespace-nowrap transition-colors ${adminTab === 'users' ? 'text-indigo-600 bg-white border-b-2 border-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>Użytkownicy ({usersList.length})</button>
                            <button onClick={() => setAdminTab('restaurants')} className={`px-6 py-4 text-xs font-black uppercase tracking-widest whitespace-nowrap transition-colors ${adminTab === 'restaurants' ? 'text-indigo-600 bg-white border-b-2 border-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>Restauracje ({restaurants.length})</button>
                            <button onClick={() => setAdminTab('tickets')} className={`px-6 py-4 text-xs font-black uppercase tracking-widest whitespace-nowrap transition-colors ${adminTab === 'tickets' ? 'text-indigo-600 bg-white border-b-2 border-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>Zgłoszenia ({tickets.length})</button>
                            <button onClick={() => setAdminTab('notes')} className={`px-6 py-4 text-xs font-black uppercase tracking-widest whitespace-nowrap transition-colors ${adminTab === 'notes' ? 'text-indigo-600 bg-white border-b-2 border-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>Notatki ({notes.length})</button>
                        </div>

                        <div className="p-0 overflow-x-auto">
                            {adminTab === 'users' && (
                                <table className="w-full text-left border-collapse min-w-[600px] animate-in fade-in">
                                    <thead>
                                        <tr className="bg-slate-50/50 border-b border-slate-200 text-[10px] uppercase font-black text-slate-500">
                                            <th className="px-6 py-4">Użytkownik (E-mail)</th>
                                            <th className="px-6 py-4">Status / Rola</th>
                                            <th className="px-6 py-4">Data dołączenia</th>
                                            <th className="px-6 py-4 text-right">Zarządzanie kontem</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {usersList.map(u => (
                                            <tr key={u.id} className="hover:bg-slate-50 transition-colors group">
                                                <td className="px-6 py-4">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-xs font-black uppercase shrink-0">{u.email ? u.email.slice(0, 2) : 'U'}</div>
                                                        <span className="text-sm font-bold text-slate-800">{u.email}</span>
                                                    </div>
                                                </td>
                                                <td className="px-6 py-4">
                                                    <select 
                                                        className={`text-xs font-bold p-2 rounded-xl border outline-none cursor-pointer transition-colors shadow-sm ${u.role === 'Administrator' ? 'bg-indigo-50 text-indigo-700 border-indigo-200 focus:ring-2 focus:ring-indigo-100' : 'bg-slate-50 text-slate-600 border-slate-200 focus:ring-2 focus:ring-slate-200'}`}
                                                        value={u.role || 'Serwisant'}
                                                        onChange={(e) => onRoleChange(u.id, e.target.value)}
                                                    >
                                                        <option value="Serwisant">Serwisant</option>
                                                        <option value="Administrator">Administrator</option>
                                                    </select>
                                                </td>
                                                <td className="px-6 py-4 text-xs text-slate-500 font-medium">
                                                    {u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'Brak danych'}
                                                </td>
                                                <td className="px-6 py-4 text-right">
                                                    <button onClick={() => onOpenPasswordModal(u)} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors inline-flex items-center gap-2" title="Zmień/Resetuj hasło">
                                                        <Key size={16} /> <span className="text-xs font-bold hidden sm:inline">Zarządzaj hasłem</span>
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                        {usersList.length === 0 && (<tr><td colSpan="4" className="text-center py-8 text-sm text-slate-400 italic">Brak użytkowników.</td></tr>)}
                                    </tbody>
                                </table>
                            )}
                            
                            {adminTab === 'restaurants' && (
                                <table className="w-full text-left border-collapse min-w-[600px] animate-in fade-in">
                                    <thead>
                                        <tr className="bg-slate-50/50 border-b border-slate-200 text-[10px] uppercase font-black text-slate-500">
                                            <th className="px-6 py-4">Nazwa / Marka</th>
                                            <th className="px-6 py-4">Miasto</th>
                                            <th className="px-6 py-4">Autor wpisu</th>
                                            <th className="px-6 py-4 text-right">Admin: Wymuś Usunięcie</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {restaurants.map(r => (
                                            <tr key={r.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-3"><p className="text-sm font-bold text-slate-800">{r.name}</p><p className="text-[10px] text-slate-400 uppercase tracking-widest">{r.brand}</p></td>
                                                <td className="px-6 py-3 text-xs font-medium text-slate-600">{r.city}</td>
                                                <td className="px-6 py-3 text-xs font-medium text-slate-600">{r.authorEmail || 'Nieznany'}</td>
                                                <td className="px-6 py-3 text-right">
                                                    <button onClick={() => onForceDelete('restaurants', r)} className="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 rounded-lg text-xs font-bold p-2 transition-colors inline-flex items-center gap-2"><Trash2 size={14} /> Usuń</button>
                                                </td>
                                            </tr>
                                        ))}
                                        {restaurants.length === 0 && (<tr><td colSpan="4" className="text-center py-8 text-sm text-slate-400 italic">Brak restauracji.</td></tr>)}
                                    </tbody>
                                </table>
                            )}

                            {adminTab === 'tickets' && (
                                <table className="w-full text-left border-collapse min-w-[700px] animate-in fade-in">
                                    <thead>
                                        <tr className="bg-slate-50/50 border-b border-slate-200 text-[10px] uppercase font-black text-slate-500">
                                            <th className="px-6 py-4">Tytuł Zgłoszenia</th>
                                            <th className="px-6 py-4">Lokal</th>
                                            <th className="px-6 py-4">Autor wpisu</th>
                                            <th className="px-6 py-4 text-right">Admin: Wymuś Usunięcie</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {tickets.map(t => {
                                            const resName = restaurants.find(r => r.id === t.restaurantId)?.name || 'Nieznany lokal';
                                            return (
                                            <tr key={t.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-3"><p className="text-sm font-bold text-slate-800">{t.title}</p><p className="text-[10px] text-slate-400 uppercase tracking-widest">{t.status} | {t.priority}</p></td>
                                                <td className="px-6 py-3 text-xs font-medium text-slate-600">{resName}</td>
                                                <td className="px-6 py-3 text-xs font-medium text-slate-600">{t.authorEmail || 'Nieznany'}</td>
                                                <td className="px-6 py-3 text-right">
                                                    <button onClick={() => onForceDelete('tickets', t)} className="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 rounded-lg text-xs font-bold p-2 transition-colors inline-flex items-center gap-2"><Trash2 size={14} /> Usuń</button>
                                                </td>
                                            </tr>
                                        )})}
                                        {tickets.length === 0 && (<tr><td colSpan="4" className="text-center py-8 text-sm text-slate-400 italic">Brak zgłoszeń.</td></tr>)}
                                    </tbody>
                                </table>
                            )}

                            {adminTab === 'notes' && (
                                <table className="w-full text-left border-collapse min-w-[600px] animate-in fade-in">
                                    <thead>
                                        <tr className="bg-slate-50/50 border-b border-slate-200 text-[10px] uppercase font-black text-slate-500">
                                            <th className="px-6 py-4 w-1/2">Notatka (Tytuł i Podgląd)</th>
                                            <th className="px-6 py-4">Autor wpisu</th>
                                            <th className="px-6 py-4 text-right">Admin: Wymuś Usunięcie</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {notes.map(n => (
                                            <tr key={n.id} className="hover:bg-slate-50 transition-colors">
                                                <td className="px-6 py-3"><p className="text-sm font-bold text-slate-800">{n.title}</p><p className="text-[10px] text-slate-400 truncate mt-1">{n.content}</p></td>
                                                <td className="px-6 py-3 text-xs font-medium text-slate-600">{n.authorEmail || 'Nieznany'}</td>
                                                <td className="px-6 py-3 text-right">
                                                    <button onClick={() => onForceDelete('notes', n)} className="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 rounded-lg text-xs font-bold p-2 transition-colors inline-flex items-center gap-2"><Trash2 size={14} /> Usuń</button>
                                                </td>
                                            </tr>
                                        ))}
                                        {notes.length === 0 && (<tr><td colSpan="3" className="text-center py-8 text-sm text-slate-400 italic">Brak notatek.</td></tr>)}
                                    </tbody>
                                </table>
                            )}

                        </div>
                    </div>
                </div>
            );
        });

        const DashboardView = memo(({ restaurants, tickets, tasks, notes, onOpenTicket, onNavigate }) => (
          <div className="space-y-6 animate-in fade-in duration-500">
            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
              <StatCard title="Restauracje" value={restaurants.length} icon={Store} color="blue" onClick={() => onNavigate('restaurants')} />
              <StatCard title="Otwarte Zgłoszenia" value={tickets.filter(t => t.status !== 'Zakończone').length} icon={AlertCircle} color="red" onClick={() => onNavigate('all_tickets')} />
              <StatCard title="Zadania (Dziś)" value={tasks.filter(t => !t.completed).length} icon={CheckSquare} color="green" onClick={() => onNavigate('tasks')} />
              <StatCard title="Wszystkie Notatki" value={notes.length} icon={StickyNote} color="orange" onClick={() => onNavigate('notes')} />
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-950">
                  <Clock size={20} className="text-indigo-600" /> Ostatnie Zgłoszenia
                </h3>
                <div className="space-y-3">
                  {tickets.slice(0, 5).map(t => {
                    const tRest = restaurants.find(r => r.id === t.restaurantId);
                    return (
                      <div key={t.id} onClick={() => onOpenTicket(t)} className="flex items-center justify-between p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-indigo-50 hover:shadow-sm transition-all group">
                        <div className="flex-1">
                          <p className="font-semibold text-sm group-hover:text-indigo-700 transition-colors">{t.title}</p>
                          <p className="text-xs text-slate-500">{tRest ? tRest.name : 'Nieznany lokal'}</p>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className={`text-[10px] px-2 py-1 rounded-full font-bold uppercase ${t.priority === 'Wysoki' ? 'bg-red-100 text-red-700' : 'bg-slate-100'}`}>{t.priority}</span>
                          <ChevronRight size={14} className="text-slate-300 group-hover:text-indigo-400 group-hover:translate-x-1 transition-all" />
                        </div>
                      </div>
                    );
                  })}
                  {tickets.length === 0 && <p className="text-sm text-slate-400 italic">Brak zgłoszeń.</p>}
                </div>
              </div>

              <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-indigo-950">
                  <CheckSquare size={20} className="text-green-600" /> Zadania Priorytetowe
                </h3>
                <div className="space-y-3">
                  {tasks.filter(t => !t.completed).slice(0, 5).map(t => (
                    <div key={t.id} className="flex items-center gap-3 p-3 border-l-4 border-green-500 bg-green-50/30 rounded-r-xl">
                      <input type="checkbox" className="rounded text-green-600" readOnly />
                      <div className="flex-1">
                        <p className="font-semibold text-sm">{t.title}</p>
                        <p className="text-xs text-slate-500">Termin: {t.deadline}</p>
                      </div>
                    </div>
                  ))}
                  {tasks.filter(t => !t.completed).length === 0 && <p className="text-sm text-slate-400 italic">Brak otwartych zadań w systemie.</p>}
                </div>
              </div>
            </div>
          </div>
        ));

        const AllTicketsView = memo(({ tickets, restaurants, onOpenTicket, onShareTicket, sortConfig, onRequestSort }) => {
          const renderSortIcon = (key) => {
            if (sortConfig.key !== key) return <ArrowUpDown size={10} className="text-slate-300" />;
            return sortConfig.direction === 'asc' ? <ChevronUp size={10} className="text-indigo-600" /> : <ChevronDown size={10} className="text-indigo-600" />;
          };

          return (
            <div className="space-y-4 animate-in fade-in duration-300">
              <div className="flex justify-between items-end mb-2">
                <div>
                  <h2 className="text-xl font-black tracking-tight text-indigo-950">Wszystkie Zgłoszenia</h2>
                  <p className="text-slate-500 text-xs">Podgląd statusu serwisowego całej sieci</p>
                </div>
              </div>
              <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-200 text-[10px] uppercase font-black text-slate-500">
                      <th className="px-4 py-3 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => onRequestSort('date')}><div className="flex items-center gap-1">Data {renderSortIcon('date')}</div></th>
                      <th className="px-4 py-3 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => onRequestSort('restaurantName')}><div className="flex items-center gap-1">Lokal {renderSortIcon('restaurantName')}</div></th>
                      <th className="px-4 py-3">Problem</th>
                      <th className="px-4 py-3 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => onRequestSort('priority')}><div className="flex items-center gap-1">Priorytet {renderSortIcon('priority')}</div></th>
                      <th className="px-4 py-3 cursor-pointer hover:bg-slate-100 transition-colors" onClick={() => onRequestSort('status')}><div className="flex items-center gap-1">Status {renderSortIcon('status')}</div></th>
                      <th className="px-4 py-3">Akcje</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {tickets.map(t => {
                      const r = restaurants.find(res => res.id === t.restaurantId);
                      return (
                        <tr 
                          key={t.id} 
                          className="hover:bg-slate-50 transition-colors cursor-pointer group" 
                          onClick={() => onOpenTicket(t)}
                        >
                          <td className="px-4 py-3 text-xs text-slate-500">{t.date}</td>
                          <td className="px-4 py-3"><p className="text-xs font-bold text-slate-800">{r?.name}</p><p className="text-[9px] text-slate-400">{r?.brand}</p></td>
                          <td className="px-4 py-3 text-xs font-medium text-slate-700">{t.title}</td>
                          <td className="px-4 py-3"><span className={`text-[9px] px-2 py-0.5 rounded-full font-bold uppercase ${t.priority === 'Wysoki' ? 'bg-red-50 text-red-600' : 'bg-slate-100'}`}>{t.priority}</span></td>
                          <td className="px-4 py-3"><span className={`text-[10px] px-2 py-1 rounded-md font-bold ${t.status === 'Zakończone' ? 'bg-green-50 text-green-700' : t.status === 'W realizacji' ? 'bg-blue-50 text-blue-700' : 'bg-slate-100 text-slate-700'}`}>{t.status}</span></td>
                          <td className="px-4 py-3">
                            <div className="flex items-center gap-2">
                              <button onClick={(e) => { e.stopPropagation(); onOpenTicket(t); }} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Otwórz zgłoszenie"><ExternalLink size={14} /></button>
                              <button onClick={(e) => { e.stopPropagation(); onShareTicket(t, r?.name); }} className="text-slate-400 hover:text-indigo-600 transition-colors" title="Udostępnij link"><Share2 size={14} /></button>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                    {tickets.length === 0 && <tr><td colSpan="6" className="text-center py-8 text-sm text-slate-400">Brak zgłoszeń w bazie.</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          );
        });

        const RestaurantListView = memo(({ restaurants, tickets, tasks, onAddClick, onSelect, sortConfig, onRequestSort, columnFilters, onFilterChange, onResetFilters }) => (
          <div className="space-y-4 animate-in slide-in-from-bottom-4 duration-300">
            <div className="flex justify-between items-end">
              <div>
                <h2 className="text-xl font-black tracking-tight text-indigo-950">Baza Restauracji ({restaurants.length})</h2>
                <p className="text-slate-500 text-xs">Zarządzaj siecią lokali i ich danymi technicznymi</p>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={onResetFilters} className="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg flex items-center gap-1.5 text-xs font-bold hover:bg-slate-200 transition-all active:scale-95 border border-slate-200" title="Wyczyść wszystkie filtry"><RotateCcw size={14} /> Wyczyść filtry</button>
                <button onClick={onAddClick} className="bg-indigo-600 text-white px-3 py-1.5 rounded-lg flex items-center gap-1.5 text-xs font-bold shadow-sm hover:bg-indigo-700 transition-all active:scale-95"><Plus size={14} /> Dodaj Lokal</button>
              </div>
            </div>
            
            <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse table-fixed min-w-[800px]">
                  <thead>
                    <tr className="bg-slate-50/80 border-b border-slate-200 text-slate-500 text-[10px] uppercase tracking-wider font-black">
                      <th className="px-4 py-3 w-32">
                        <div className="flex flex-col gap-1.5 text-indigo-900/60">
                          <div className="flex items-center gap-1 cursor-pointer hover:text-indigo-600 transition-colors" onClick={() => onRequestSort('brand')}>Marka <ArrowUpDown size={10} /></div>
                          <div className="relative"><Search size={10} className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400" /><input type="text" placeholder="Filtruj..." className="w-full pl-5 pr-2 py-1 bg-white border border-slate-200 rounded text-[9px] font-medium outline-none focus:ring-1 focus:ring-indigo-500" value={columnFilters.brand} onChange={(e) => onFilterChange('brand', e.target.value)} /></div>
                        </div>
                      </th>
                      <th className="px-4 py-3">
                        <div className="flex flex-col gap-1.5 text-indigo-900/60">
                          <div className="flex items-center gap-1 cursor-pointer hover:text-indigo-600 transition-colors" onClick={() => onRequestSort('name')}>Nazwa <ArrowUpDown size={10} /></div>
                          <div className="relative"><Search size={10} className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400" /><input type="text" placeholder="Filtruj..." className="w-full pl-5 pr-2 py-1 bg-white border border-slate-200 rounded text-[9px] font-medium outline-none focus:ring-1 focus:ring-indigo-500" value={columnFilters.name} onChange={(e) => onFilterChange('name', e.target.value)} /></div>
                        </div>
                      </th>
                      <th className="px-4 py-3 w-32">
                        <div className="flex flex-col gap-1.5 text-indigo-900/60">
                          <div className="flex items-center gap-1 cursor-pointer hover:text-indigo-600 transition-colors" onClick={() => onRequestSort('city')}>Miasto <ArrowUpDown size={10} /></div>
                          <div className="relative"><Search size={10} className="absolute left-2 top-1/2 -translate-y-1/2 text-slate-400" /><input type="text" placeholder="Filtruj..." className="w-full pl-5 pr-2 py-1 bg-white border border-slate-200 rounded text-[9px] font-medium outline-none focus:ring-1 focus:ring-indigo-500" value={columnFilters.city} onChange={(e) => onFilterChange('city', e.target.value)} /></div>
                        </div>
                      </th>
                      <th className="px-4 py-3 w-24 text-center">
                        <div className="flex flex-col gap-1.5 items-center text-indigo-900/60">
                          <div className="flex items-center gap-1 cursor-pointer hover:text-indigo-600 transition-colors" onClick={() => onRequestSort('tickets')}>Status <ArrowUpDown size={10} /></div>
                          <div className="h-[22px]" />
                        </div>
                      </th>
                      <th className="px-4 py-3 w-16 text-right"></th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {restaurants.map(r => (
                      <tr key={r.id} className="hover:bg-slate-50/80 transition-colors group cursor-pointer" onClick={() => onSelect(r)}>
                        <td className="px-4 py-2.5"><span className={`px-2 py-0.5 rounded text-[9px] font-black uppercase whitespace-nowrap ${BRANDS[r.brand]?.color} ${BRANDS[r.brand]?.text}`}>{r.brand}</span></td>
                        <td className="px-4 py-2.5"><p className="font-bold text-slate-800 text-xs leading-none">{r.name}</p><p className="text-[9px] text-slate-400 mt-1 truncate">{r.address}</p></td>
                        <td className="px-4 py-2.5"><p className="text-xs text-slate-600 font-semibold">{r.city}</p></td>
                        <td className="px-4 py-2.5">
                          <div className="flex items-center justify-center gap-3">
                            <div className="flex items-center gap-1" title="Zgłoszenia"><AlertCircle size={10} className="text-red-400" /><span className="text-[10px] font-bold text-slate-600">{tickets.filter(t => t.restaurantId === r.id).length}</span></div>
                            <div className="flex items-center gap-1" title="Zadania"><CheckSquare size={10} className="text-green-400" /><span className="text-[10px] font-bold text-slate-600">{tasks.filter(t => t.restaurantId === r.id && !t.completed).length}</span></div>
                          </div>
                        </td>
                        <td className="px-4 py-2.5 text-right"><div className="opacity-0 group-hover:opacity-100 transition-opacity"><ChevronRight size={14} className="text-indigo-600 inline-block" /></div></td>
                      </tr>
                    ))}
                    {restaurants.length === 0 && <tr><td colSpan="5" className="text-center py-8 text-sm text-slate-400">Brak restauracji w bazie danych. Dodaj pierwszą klikając "Dodaj Lokal".</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        ));

        // --- GLOBALNE ARCHIWUM AKTYWNOŚCI ---
        const ArchiveView = memo(({ logs, restaurants, canModifyItem, onDeleteLog }) => {
            const sortedLogs = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));
            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                  <div className="flex justify-between items-end mb-4">
                    <div>
                      <h2 className="text-xl font-black tracking-tight text-indigo-950">Archiwum Systemowe</h2>
                      <p className="text-slate-500 text-xs">Globalny rejestr wszystkich operacji i zmian wprowadzanych przez użytkowników</p>
                    </div>
                  </div>
                  <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr className="bg-slate-50 border-b border-slate-200 text-[10px] uppercase font-black text-slate-500">
                                    <th className="px-4 py-3 w-40">Data i Godzina</th>
                                    <th className="px-4 py-3 w-32">Kategoria</th>
                                    <th className="px-4 py-3 w-48">Lokal / Kontekst</th>
                                    <th className="px-4 py-3">Szczegóły akcji (Użytkownik - Czynność)</th>
                                    <th className="px-4 py-3 w-16 text-right">Akcje</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {sortedLogs.map(log => {
                                    const parsedDate = new Date(log.date);
                                    const rName = restaurants.find(r => r.id === log.restaurantId)?.name || 'Ogólne';
                                    
                                    let catColor = 'bg-slate-100 text-slate-600';
                                    let catLabel = 'System';
                                    if(log.type === 'ticket') { catColor = 'bg-red-50 text-red-600'; catLabel = 'Zgłoszenie'; }
                                    if(log.type === 'task') { catColor = 'bg-green-50 text-green-700'; catLabel = 'Zadanie'; }
                                    if(log.type === 'note') { catColor = 'bg-amber-50 text-amber-700'; catLabel = 'Notatka'; }
                                    if(log.type === 'doc') { catColor = 'bg-blue-50 text-blue-700'; catLabel = 'Dokument'; }
                                    if(log.type === 'restaurant') { catColor = 'bg-indigo-50 text-indigo-700'; catLabel = 'Restauracja'; }

                                    return (
                                        <tr key={log.id} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="px-4 py-3">
                                                <div className="text-xs font-bold text-slate-700">{parsedDate.toLocaleDateString()}</div>
                                                <div className="text-[10px] text-slate-400">{parsedDate.toLocaleTimeString()}</div>
                                            </td>
                                            <td className="px-4 py-3">
                                                <span className={`text-[9px] px-2 py-1 rounded font-black uppercase ${catColor}`}>{catLabel}</span>
                                            </td>
                                            <td className="px-4 py-3 text-xs font-semibold text-slate-600 truncate">
                                                {rName}
                                            </td>
                                            <td className="px-4 py-3 text-xs text-slate-800 leading-relaxed font-medium whitespace-pre-wrap">
                                                {log.description}
                                            </td>
                                            <td className="px-4 py-3 text-right">
                                                {canModifyItem(log.authorEmail) && (
                                                    <button onClick={() => onDeleteLog(log.id)} className="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Usuń trwale"><Trash2 size={14}/></button>
                                                )}
                                            </td>
                                        </tr>
                                    );
                                })}
                                {sortedLogs.length === 0 && (
                                    <tr><td colSpan="5" className="text-center py-8 text-sm text-slate-400 italic">Brak wpisów w archiwum.</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                  </div>
                </div>
            );
        });

        const TicketDetailView = ({
            ticket, restaurant, onBack, onSave, isSubmittingAction, canModifyItem,
            attachments, onUploadAttachment, isUploading, uploadProgress, onDeleteAttachment, onPreview, ticketLogs = [],
            onAddUpdateWithFiles, onEditUpdate, onDeleteUpdate, onDeleteTicket, onDeleteLog
        }) => {
            const isNew = !ticket;

            const [title, setTitle] = useState(ticket?.title || '');
            const [priority, setPriority] = useState(ticket?.priority || 'Średni');
            const [status, setStatus] = useState(ticket?.status || 'Nowe');
            const [desc, setDesc] = useState(ticket?.description || '');

            const [isEditingDesc, setIsEditingDesc] = useState(isNew);
            const [updateText, setUpdateText] = useState('');
            const [updateFiles, setUpdateFiles] = useState([]); 

            const [editingUpdateId, setEditingUpdateId] = useState(null);
            const [editUpdateText, setEditUpdateText] = useState('');
            
            const [aiTip, setAiTip] = useState('');
            const [loadingAi, setLoadingAi] = useState(false);
            const [expandedLogId, setExpandedLogId] = useState(null);
            
            const ticketUpdates = ticket?.updates || [];
            const hasMainChanges = !isNew && (title !== ticket.title || priority !== ticket.priority || status !== ticket.status);
            
            const suggestSolution = async () => {
                if (!title || (!desc && !ticket?.description)) return;
                setLoadingAi(true);
                try {
                    const result = await callGemini(`Zgłoszenie: ${title}. Opis: ${desc || ticket?.description}. Zaproponuj 3 konkretne kroki naprawcze.`, "Jesteś ekspertem serwisowym.");
                    setAiTip(result);
                } catch(e) { setAiTip("Błąd AI."); } finally { setLoadingAi(false); }
            };

            const handleCreateNew = () => { onSave({ restaurantId: restaurant?.id, title, priority, status, description: desc }); };
            const handleSaveMainDetails = () => { onSave({ id: ticket.id, title, priority, status, restaurantId: ticket.restaurantId }); };
            const handleSaveDescription = () => { onSave({ id: ticket.id, description: desc, restaurantId: ticket.restaurantId }); setIsEditingDesc(false); };

            const submitUpdate = async () => {
                if (!updateText.trim() && updateFiles.length === 0) return;
                await onAddUpdateWithFiles(ticket.id, updateText.trim(), updateFiles);
                setUpdateText('');
                setUpdateFiles([]);
            };

            const mainAttachments = attachments.filter(a => !a.updateId);
            const updateAttachments = attachments.filter(a => a.updateId);

            if (isNew) {
                return (
                    <div className="space-y-6 animate-in fade-in duration-300">
                        <button onClick={onBack} className="text-indigo-600 font-semibold text-sm flex items-center gap-1 hover:underline group">
                            <ChevronLeft size={16} className="group-hover:-translate-x-1 transition-transform" /> Powrót
                        </button>
                        
                        <div>
                            <h2 className="text-2xl font-black text-indigo-950 tracking-tight">Nowe Zgłoszenie</h2>
                            <p className="text-sm text-slate-500">{restaurant?.name || 'Brak lokalu'} • {restaurant?.city}</p>
                        </div>

                        <div className="bg-white p-8 rounded-2xl border border-slate-200 shadow-sm space-y-6 max-w-4xl">
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider text-indigo-950/60">Tytuł Zgłoszenia</label>
                                <input required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm font-bold text-indigo-950 focus:ring-2 focus:ring-indigo-100 transition-all" placeholder="Krótki opis usterki..." value={title} onChange={e => setTitle(e.target.value)} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider text-indigo-950/60">Priorytet</label>
                                    <select className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm font-semibold text-indigo-950 focus:ring-2 focus:ring-indigo-100 transition-all" value={priority} onChange={e => setPriority(e.target.value)}>
                                        <option>Niski</option><option>Średni</option><option>Wysoki</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider text-indigo-950/60">Status wstępny</label>
                                    <select className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm font-bold text-indigo-600 focus:ring-2 focus:ring-indigo-100 transition-all" value={status} onChange={e => setStatus(e.target.value)}>
                                        <option>Nowe</option><option>W realizacji</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider text-indigo-950/60">Opis szczegółowy</label>
                                <textarea rows="5" className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm resize-none leading-relaxed text-indigo-950 focus:ring-2 focus:ring-indigo-100 transition-all" placeholder="Opisz dokładnie problem..." value={desc} onChange={e => setDesc(e.target.value)} />
                            </div>

                            <div className="flex justify-end pt-4 border-t border-slate-100">
                                <button onClick={handleCreateNew} disabled={isSubmittingAction || !title} className="px-8 py-3 bg-indigo-600 text-white rounded-xl text-sm font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95 disabled:opacity-50 flex items-center gap-2">
                                    {isSubmittingAction ? <Loader2 size={16} className="animate-spin" /> : <Save size={16} />}
                                    Zapisz i utwórz zgłoszenie
                                </button>
                            </div>
                        </div>
                    </div>
                )
            }

            return (
                <div className="space-y-6 animate-in fade-in duration-300">
                     <button onClick={onBack} className="text-indigo-600 font-semibold text-sm flex items-center gap-1 hover:underline group">
                        <ChevronLeft size={16} className="group-hover:-translate-x-1 transition-transform" /> Powrót
                     </button>
                     
                     <div className="flex items-center justify-between">
                         <div>
                             <h2 className="text-2xl font-black text-indigo-950 tracking-tight">Zgłoszenie: {ticket.title}</h2>
                             <p className="text-sm text-slate-500">{restaurant?.name || 'Brak lokalu'} • {restaurant?.city}</p>
                         </div>
                         {canModifyItem(ticket.authorEmail) && (
                             <button onClick={() => onDeleteTicket(ticket)} disabled={isSubmittingAction} className="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-bold shadow-sm hover:bg-red-100 transition-all flex items-center gap-2 disabled:opacity-50">
                                 {isSubmittingAction ? <Loader2 size={16} className="animate-spin"/> : <Trash2 size={16} />} Usuń Zgłoszenie
                             </button>
                         )}
                     </div>

                     <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                         <div className="lg:col-span-2 space-y-6">
                             <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                  <div className="space-y-4">
                                      <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider text-indigo-950/60">Tytuł Zgłoszenia</label>
                                        <input className="w-full mt-1 p-3 bg-slate-50 border border-transparent rounded-xl outline-none text-sm font-bold text-indigo-950 focus:bg-white focus:border-indigo-200 focus:ring-2 focus:ring-indigo-50 transition-all" value={title} onChange={e => setTitle(e.target.value)} disabled={!canModifyItem(ticket.authorEmail)} />
                                      </div>

                                      <div className="grid grid-cols-2 gap-4">
                                         <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider text-indigo-950/60">Priorytet</label>
                                            <select className="w-full mt-1 p-3 bg-slate-50 border border-transparent rounded-xl outline-none text-sm font-semibold text-indigo-950 focus:bg-white focus:border-indigo-200 focus:ring-2 focus:ring-indigo-50 transition-all cursor-pointer" value={priority} onChange={e => setPriority(e.target.value)} disabled={!canModifyItem(ticket.authorEmail)}>
                                                <option>Niski</option><option>Średni</option><option>Wysoki</option>
                                            </select>
                                         </div>
                                         <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-wider text-indigo-950/60">Status</label>
                                            <select className={`w-full mt-1 p-3 bg-slate-50 border border-transparent rounded-xl outline-none text-sm font-bold focus:bg-white focus:border-indigo-200 focus:ring-2 focus:ring-indigo-50 transition-all cursor-pointer ${status === 'Zakończone' ? 'text-green-600' : 'text-indigo-600'}`} value={status} onChange={e => setStatus(e.target.value)} disabled={!canModifyItem(ticket.authorEmail)}>
                                                <option>Nowe</option><option>W realizacji</option><option>Wstrzymane</option><option>Zakończone</option>
                                            </select>
                                         </div>
                                      </div>

                                      {hasMainChanges && canModifyItem(ticket.authorEmail) && (
                                          <div className="flex justify-end gap-2 pt-4 mt-2 border-t border-slate-100 animate-in fade-in duration-200">
                                              <button onClick={() => {setTitle(ticket.title); setPriority(ticket.priority); setStatus(ticket.status);}} className="px-5 py-2 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-all">Anuluj</button>
                                              <button onClick={handleSaveMainDetails} disabled={isSubmittingAction || !title} className="px-5 py-2 bg-indigo-600 text-white rounded-xl text-xs font-bold shadow-md hover:bg-indigo-700 transition-all active:scale-95 disabled:opacity-50 flex items-center gap-2">
                                                  {isSubmittingAction ? <Loader2 size={14} className="animate-spin" /> : <Save size={14} />} Zapisz
                                              </button>
                                          </div>
                                      )}
                                  </div>
                             </div>

                             <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-6">
                                  <div className="flex items-center justify-between mb-4">
                                      <h3 className="text-sm font-bold text-indigo-950 flex items-center gap-2">
                                          <MessageSquare size={18} className="text-indigo-500" /> Przebieg zgłoszenia
                                      </h3>
                                      <button onClick={suggestSolution} disabled={loadingAi || (!desc && !ticket.description)} className="flex items-center gap-2 text-[10px] font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition-all disabled:opacity-50 shadow-sm">
                                          {loadingAi ? <Loader2 size={12} className="animate-spin" /> : <Sparkles size={12} />} Rozwiązanie AI
                                      </button>
                                  </div>
                                  
                                  {aiTip && (<div className="p-4 bg-indigo-50/50 border border-indigo-100 rounded-2xl animate-in slide-in-from-top-2"><div className="text-xs text-indigo-900 leading-relaxed whitespace-pre-wrap">{aiTip}</div></div>)}

                                  <div className="space-y-4">
                                      <div className="bg-slate-50 border border-slate-100 rounded-xl p-4">
                                          <div className="flex justify-between items-center mb-2">
                                              <span className="text-[10px] font-black uppercase text-slate-500">Pierwotny opis zgłoszenia</span>
                                              {!isEditingDesc && canModifyItem(ticket.authorEmail) && (
                                                  <button onClick={() => {setDesc(ticket.description || ''); setIsEditingDesc(true);}} className="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 transition-colors flex items-center gap-1">
                                                      <Pencil size={12} /> Edytuj
                                                  </button>
                                              )}
                                          </div>
                                          {isEditingDesc ? (
                                               <div className="animate-in fade-in duration-200 mt-2">
                                                   <textarea rows="4" className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none text-sm resize-none leading-relaxed text-indigo-950 focus:ring-2 focus:ring-indigo-100 transition-all shadow-sm" value={desc} onChange={e => setDesc(e.target.value)} />
                                                   <div className="flex justify-end gap-2 mt-3">
                                                       <button onClick={() => { setIsEditingDesc(false); setDesc(ticket.description || ''); }} className="px-4 py-1.5 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-lg transition-all">Anuluj</button>
                                                       <button onClick={handleSaveDescription} disabled={isSubmittingAction || (desc === ticket.description)} className="px-4 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 shadow-md transition-all disabled:opacity-50 flex items-center gap-1.5">
                                                            {isSubmittingAction ? <Loader2 size={12} className="animate-spin" /> : <Save size={12} />} Zapisz zmiany
                                                       </button>
                                                   </div>
                                               </div>
                                          ) : (
                                               <div className="text-sm leading-relaxed text-slate-700 whitespace-pre-wrap font-medium">
                                                   {ticket.description || <span className="text-slate-400 italic">Brak opisu początkowego.</span>}
                                               </div>
                                          )}
                                      </div>

                                      {ticketUpdates.length > 0 && ticketUpdates.map(u => {
                                          const wpisAttachments = updateAttachments.filter(a => a.updateId === u.id);
                                          return (
                                          <div key={u.id} className="bg-white border border-slate-200 rounded-xl p-4 ml-4 md:ml-8 relative before:absolute before:-left-[17px] md:before:-left-[33px] before:top-1/2 before:w-4 md:before:w-8 before:h-px before:bg-slate-200 border-l-4 border-l-indigo-400 shadow-sm animate-in fade-in duration-300">
                                              <div className="flex justify-between items-center mb-2">
                                                  <div className="flex flex-col md:flex-row md:items-center md:gap-2">
                                                      <span className="text-[10px] font-black uppercase text-indigo-600">{u.author}</span>
                                                      <span className="text-[9px] text-slate-400 font-medium">{new Date(u.date).toLocaleString()}</span>
                                                  </div>
                                                  
                                                  {canModifyItem(u.authorEmail) && (
                                                      <div className="flex gap-3 ml-2 shrink-0">
                                                          {editingUpdateId !== u.id && (
                                                              <button onClick={() => { setEditingUpdateId(u.id); setEditUpdateText(u.text); }} className="text-[10px] font-bold text-indigo-600 hover:text-indigo-800 transition-colors flex items-center gap-1">
                                                                  <Pencil size={12} /> Edytuj
                                                              </button>
                                                          )}
                                                          <button onClick={() => onDeleteUpdate(ticket.id, u.id)} className="text-[10px] font-bold text-red-500 hover:text-red-700 transition-colors flex items-center gap-1">
                                                              <Trash2 size={12} /> Usuń
                                                          </button>
                                                      </div>
                                                  )}
                                              </div>
                                              
                                              {editingUpdateId === u.id ? (
                                                  <div className="mt-2 animate-in fade-in">
                                                      <textarea rows="3" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm resize-none focus:ring-2 focus:ring-indigo-100 transition-all text-indigo-950" value={editUpdateText} onChange={e => setEditUpdateText(e.target.value)} />
                                                      <div className="flex justify-end gap-2 mt-3">
                                                          <button onClick={() => setEditingUpdateId(null)} className="px-4 py-1.5 text-xs font-bold text-slate-500 hover:bg-slate-100 rounded-lg transition-all">Anuluj</button>
                                                          <button onClick={() => { onEditUpdate(ticket.id, u.id, editUpdateText); setEditingUpdateId(null); }} className="px-4 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold shadow-md hover:bg-indigo-700 transition-all disabled:opacity-50" disabled={isSubmittingAction || !editUpdateText.trim()}>Zapisz</button>
                                                      </div>
                                                  </div>
                                              ) : (
                                                  <div className="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed font-medium">{u.text}</div>
                                              )}
                                              
                                              {wpisAttachments.length > 0 && (
                                                  <div className="mt-3 flex flex-wrap gap-2 pt-3 border-t border-slate-100">
                                                      {wpisAttachments.map(att => {
                                                          const isImg = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'heic'].includes(att.type?.toLowerCase());
                                                          return (
                                                              <div key={att.id} onClick={() => onPreview({title: att.title, type: att.type, url: att.url})} className="relative group cursor-pointer w-12 h-12 rounded-lg overflow-hidden border border-slate-200 shadow-sm bg-slate-50">
                                                                  {isImg ? (
                                                                      <img src={att.url} alt={att.title} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300" />
                                                                  ) : (
                                                                      <div className="w-full h-full flex flex-col items-center justify-center text-indigo-400 group-hover:bg-indigo-50 transition-colors">
                                                                          <FileText size={16} />
                                                                          <span className="text-[7px] font-bold mt-0.5">{att.type}</span>
                                                                      </div>
                                                                  )}
                                                              </div>
                                                          );
                                                      })}
                                                  </div>
                                              )}
                                          </div>
                                      )})}

                                      <div className="ml-4 md:ml-8 mt-6 relative before:absolute before:-left-[17px] md:before:-left-[33px] before:top-1/2 before:w-4 md:before:w-8 before:h-px before:bg-slate-200">
                                          <div className="flex flex-col gap-2 bg-indigo-50/30 p-4 rounded-xl border border-indigo-100/50">
                                              <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1">Dodaj kolejny wpis</label>
                                              <textarea rows="2" className="w-full p-3 bg-white border border-slate-200 rounded-xl outline-none text-sm resize-none focus:ring-2 focus:ring-indigo-100 transition-all text-indigo-950 shadow-sm" placeholder="Odpowiedz / zaktualizuj przebieg..." value={updateText} onChange={e => setUpdateText(e.target.value)} disabled={isSubmittingAction || isUploading} />
                                              
                                              {updateFiles.length > 0 && (
                                                  <div className="flex flex-wrap gap-2 mt-2">
                                                      {updateFiles.map((f, i) => (
                                                          <div key={i} className="flex items-center gap-1.5 bg-indigo-100 text-indigo-700 px-2 py-1.5 rounded-lg text-[10px] font-bold shrink-0 animate-in zoom-in-95 duration-200 shadow-sm">
                                                              <Paperclip size={12} className="shrink-0" />
                                                              <span className="truncate max-w-[120px]">{f.name}</span>
                                                              <button onClick={() => setUpdateFiles(prev => prev.filter((_, idx) => idx !== i))} className="hover:text-red-500 ml-1 bg-white/50 rounded-md p-0.5"><X size={12}/></button>
                                                          </div>
                                                      ))}
                                                  </div>
                                              )}

                                              <div className="flex items-center justify-between mt-2">
                                                  <label className={`cursor-pointer px-3 py-2 bg-white border border-slate-200 text-slate-500 rounded-lg hover:bg-slate-50 hover:text-indigo-600 transition-colors flex items-center gap-1.5 text-xs font-bold shadow-sm ${isUploading ? 'opacity-50 pointer-events-none' : ''}`}>
                                                      <Paperclip size={14} /> <span className="hidden sm:inline">Dołącz pliki do wpisu</span>
