             return (
               <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                 <div className="w-full max-w-md bg-white rounded-3xl shadow-xl border border-slate-100 p-8 text-indigo-950 animate-in fade-in zoom-in-95 duration-300">
                    <div className="flex justify-center mb-6">
                      <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-indigo-100">
                        <BarChart3 size={32} />
                      </div>
                    </div>
                    <h2 className="text-2xl font-black text-center tracking-tight mb-2">
                      {isAuthMode ? 'Witaj ponownie' : 'Utwórz konto'}
                    </h2>
                    <p className="text-center text-sm text-slate-500 mb-8">
                      {isAuthMode ? 'Zaloguj się do sieci Restaurant Hub' : 'Zarejestruj się w systemie'}
                    </p>

                    {authErrorLocal && (
                      <div className="mb-6 p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-xs font-bold flex flex-col gap-2 leading-relaxed text-left shadow-sm">
                        <div className="flex items-center gap-2 text-sm"><AlertTriangle size={18} className="shrink-0" /> Wykryto problem</div>
                        <p>{authErrorLocal}</p>
                      </div>
                    )}

                    <form onSubmit={handleAuthSubmit} className="space-y-4">
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">E-mail</label>
                        <input type="email" required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-100 transition-all text-indigo-950" value={authEmail} onChange={e => setAuthEmail(e.target.value)} />
                      </div>
                      <div>
                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Hasło</label>
                        <input type="password" required minLength="6" className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm focus:ring-2 focus:ring-indigo-100 transition-all text-indigo-950" value={authPassword} onChange={e => setAuthPassword(e.target.value)} />
                      </div>
                      
                      <div className="flex items-center gap-2 mt-2 px-1">
                         <input type="checkbox" id="remember" className="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)} />
                         <label htmlFor="remember" className="text-xs font-semibold text-slate-600 cursor-pointer">Zapamiętaj mnie na tym urządzeniu</label>
                      </div>

                      <button type="submit" disabled={isAuthLoading} className="w-full py-3 mt-4 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
                        {isAuthLoading ? <Loader2 size={16} className="animate-spin" /> : (isAuthMode ? 'Zaloguj się' : 'Zarejestruj się')}
                      </button>
                    </form>

                    <div className="mt-6 text-center">
                      <button onClick={() => { setIsAuthMode(!isAuthMode); setAuthErrorLocal(''); }} className="text-xs font-semibold text-slate-500 hover:text-indigo-600 transition-colors">
                        {isAuthMode ? 'Nie masz konta? Kliknij, aby się zarejestrować.' : 'Masz już konto? Zaloguj się.'}
                      </button>
                    </div>
                 </div>
               </div>
             );
          }

          // GŁÓWNA APLIKACJA
          return (
            <div className="min-h-screen bg-slate-50 flex font-sans text-slate-900 overflow-hidden text-indigo-950">
              <aside className="w-20 md:w-64 bg-white border-r border-slate-200 flex flex-col transition-all shrink-0 relative z-10">
                <div className="p-6 flex items-center gap-3">
                  <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shrink-0 shadow-lg shadow-indigo-100"><BarChart3 size={24} /></div>
                  <div className="flex flex-col">
                      <span className="font-black text-xl tracking-tighter hidden md:block text-indigo-950 leading-none">RESTAURANT<span className="text-indigo-600">HUB</span></span>
                      {currentUserProfile?.role && <span className="text-[10px] font-bold text-indigo-400 uppercase tracking-widest hidden md:block mt-1">{currentUserProfile.role}</span>}
                  </div>
                </div>
                <nav className="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
                  <NavItem icon={LayoutDashboard} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                  <NavItem icon={Store} label="Restauracje" active={activeTab === 'restaurants' || activeTab === 'details' || (activeTab === 'ticket_detail' && selectedRestaurant)} onClick={() => setActiveTab('restaurants')} />
                  <NavItem icon={AlertTriangle} label="Zgłoszenia" active={activeTab === 'all_tickets' || (activeTab === 'ticket_detail' && !selectedRestaurant)} onClick={() => setActiveTab('all_tickets')} />
                  <NavItem icon={ArchiveIcon} label="Archiwum" active={activeTab === 'archive'} onClick={() => setActiveTab('archive')} />
                  <div className="h-px bg-slate-100 my-2 mx-4"></div>
                  <NavItem icon={CheckSquare} label="Zadania i Plany" active={activeTab === 'tasks'} onClick={() => setActiveTab('tasks')} />
                  <NavItem icon={BookOpen} label="Dokumentacja" active={activeTab === 'docs'} onClick={() => setActiveTab('docs')} />
                  <NavItem icon={StickyNote} label="Wspólne Notatki" active={activeTab === 'notes'} onClick={() => setActiveTab('notes')} />
                  
                  {currentUserProfile?.role === 'Administrator' && (
                      <>
                        <div className="h-px bg-slate-100 my-2 mx-4"></div>
                        <NavItem icon={ShieldCheck} label="Panel Admina" active={activeTab === 'admin'} onClick={() => setActiveTab('admin')} />
                      </>
                  )}
                </nav>
                <div className="p-4 mt-auto border-t border-slate-100 flex flex-col items-center justify-center">
                  <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center"><span className="hidden md:inline">Wersja </span>{APP_VERSION}</p>
                </div>
              </aside>

              <main className="flex-1 flex flex-col h-screen overflow-hidden">
                <header className="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0">
                  <div className="relative w-96 hidden lg:block">
                    <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300" size={18} />
                    <input type="text" placeholder="Wyszukiwanie globalne..." className="w-full bg-slate-50 border-none rounded-xl pl-10 pr-4 py-2 text-sm outline-none focus:ring-1 focus:ring-indigo-100 transition-all text-indigo-950" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                  </div>
                  <div className="flex items-center gap-4">
                    <button className="p-2 text-slate-400 hover:text-indigo-600 transition-colors relative">
                      <AlertCircle size={20} />
                      {tickets.length > 0 && <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>}
                    </button>
                    <div className="flex items-center gap-3">
                      <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-[10px] font-black uppercase" title={user.email}>{user.email ? user.email.slice(0, 2) : 'A'}</div>
                      <button onClick={handleLogout} className="p-2 text-slate-400 hover:text-red-500 bg-slate-50 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-2 text-xs font-bold"><LogOut size={16} /> <span className="hidden lg:block">Wyloguj</span></button>
                    </div>
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-8 bg-[#fdfdfe] relative">
                  {activeTab === 'dashboard' && <DashboardView restaurants={restaurants} tickets={tickets} tasks={tasks} notes={notes} onOpenTicket={handleOpenTicket} onNavigate={setActiveTab} />}
                  
                  {activeTab === 'admin' && currentUserProfile?.role === 'Administrator' && (
                      <AdminView 
                          usersList={systemUsers} 
                          restaurants={restaurants}
                          tickets={tickets}
                          notes={notes}
                          onRoleChange={handleRoleChange} 
                          onOpenPasswordModal={(userToChange) => { setPasswordUser(userToChange); setIsPasswordModalOpen(true); }}
                          onForceDelete={handleAdminForceDelete}
                      />
                  )}

                  {activeTab === 'restaurants' && (
                    <RestaurantListView 
                      restaurants={filteredAndSortedRestaurants} tickets={tickets} tasks={tasks}
                      onAddClick={() => setIsAddRestaurantModalOpen(true)}
                      onSelect={(r) => { setSelectedRestaurant(r); setActiveTab('details'); }}
                      sortConfig={resSortConfig}
                      onRequestSort={(key) => { let dir = 'asc'; if (resSortConfig.key === key && resSortConfig.direction === 'asc') dir = 'desc'; setResSortConfig({ key, direction: dir }); }}
                      columnFilters={columnFilters} onFilterChange={(key, val) => setColumnFilters(prev => ({ ...prev, [key]: val }))}
                      onResetFilters={handleResetFilters}
                    />
                  )}

                  {activeTab === 'details' && selectedRestaurant && (
                    <RestaurantDetailContent 
                      r={selectedRestaurant} tickets={tickets} tasks={tasks} notes={notes} docs={docs} historyLogs={historyLogs}
                      activeDetailTab={activeDetailTab} setActiveDetailTab={setActiveDetailTab} setActiveTab={setActiveTab}
                      setIsSettingsOpen={setIsSettingsOpen} isSettingsOpen={isSettingsOpen} setIsDeleteModalOpen={setIsDeleteModalOpen}
                      onEditClick={() => { setEditRestaurantData(selectedRestaurant); setIsEditRestaurantModalOpen(true); }}
                      canModifyItem={canModifyItem}
                      onCreateTicket={() => { setSelectedTicket(null); setActiveTab('ticket_detail'); }} 
                      onOpenTicket={handleOpenTicket}
                      onShareTicket={() => showToast("Udostępnianie działa tylko na serwerze")}
                      isNoteModalOpen={isNoteModalOpen} setIsNoteModalOpen={setIsNoteModalOpen} newNote={newNote} setNewNote={setNewNote}
                      onAddNote={handleAddNote} onDeleteNote={(note) => setNoteToDelete(note)} onEditNote={(note) => { setEditNoteData(note); setIsEditNoteModalOpen(true); }}
                      onAddTask={() => setIsAddTaskModalOpen(true)} onEditTask={(task) => { setEditTaskData(task); setIsEditTaskModalOpen(true); }} 
                      onDeleteTask={(task) => setTaskToDelete(task)} onToggleTask={handleToggleTask}
                      isSubmittingAction={isSubmittingAction}
                      onFileUpload={handleFileUpload} isUploadingDoc={isUploadingDoc} uploadProgress={uploadProgress} onDeleteDoc={handleDeleteDoc}
                      onPreview={setPreviewFile} onDeleteLog={handleDeleteLog}
                    />
                  )}

                  {activeTab === 'ticket_detail' && (
                    <TicketDetailView 
                        ticket={tickets.find(t => t.id === selectedTicket?.id) || selectedTicket} 
                        restaurant={selectedRestaurant || restaurants.find(r => r.id === selectedTicket?.restaurantId)}
                        onSave={handleSaveTicketDetail}
                        onCancel={() => { setActiveTab(selectedRestaurant ? 'details' : 'all_tickets'); setActiveDetailTab('tickets'); }}
                        onBack={() => { setActiveTab(selectedRestaurant ? 'details' : 'all_tickets'); setActiveDetailTab('tickets'); }}
                        onDeleteTicket={handleDeleteTicket}
                        canModifyItem={canModifyItem}
                        attachments={attachments.filter(a => a.ticketId === selectedTicket?.id)}
                        onUploadAttachment={handleTicketAttachmentUpload}
                        isUploading={isUploadingDoc}
                        uploadProgress={uploadProgress}
                        onDeleteAttachment={handleDeleteAttachment}
                        isSubmittingAction={isSubmittingAction}
                        onPreview={setPreviewFile}
                        ticketLogs={historyLogs.filter(h => h.ticketId === selectedTicket?.id)}
                        onAddUpdateWithFiles={handleAddTicketUpdateWithFiles}
                        onEditUpdate={handleEditTicketUpdate}
                        onDeleteUpdate={handleDeleteTicketUpdate}
                        onDeleteLog={handleDeleteLog}
                    />
                  )}

                  {activeTab === 'all_tickets' && (
                    <AllTicketsView 
                      tickets={sortedTickets} restaurants={restaurants} 
                      onOpenTicket={handleOpenTicket}
                      onShareTicket={() => showToast("Udostępnianie działa tylko na serwerze")}
                      sortConfig={ticketSortConfig}
                      onRequestSort={(key) => { let dir = 'asc'; if (ticketSortConfig.key === key && ticketSortConfig.direction === 'asc') dir = 'desc'; setTicketSortConfig({ key, direction: dir }); }}
                    />
                  )}

                  {activeTab === 'archive' && (
                      <ArchiveView logs={historyLogs} restaurants={restaurants} canModifyItem={canModifyItem} onDeleteLog={handleDeleteLog} />
                  )}
                  
                  {['tasks', 'docs', 'notes'].includes(activeTab) && (
                     <div className="flex flex-col items-center justify-center h-full text-center">
                        <div className="p-12 bg-white border border-slate-100 rounded-3xl shadow-xl max-w-sm">
                          <LayoutDashboard size={48} className="mx-auto mb-4 text-indigo-100" />
                          <h3 className="font-black text-xl mb-2 text-slate-800 uppercase tracking-tighter text-indigo-900">Sekcja ogólna</h3>
                          <p className="text-slate-500 text-sm leading-relaxed">Ta zakładka wyświetla dane zagregowane. Aby zarządzać konkretnym punktem, przejdź do Restauracji.</p>
                          <button onClick={() => setActiveTab('restaurants')} className="mt-8 w-full py-3 bg-indigo-600 text-white rounded-xl font-bold transition-all hover:bg-indigo-700 active:scale-95 shadow-lg shadow-indigo-100">Zobacz Restauracje</button>
                        </div>
                     </div>
                  )}

                  {toast && (
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] animate-in slide-in-from-bottom-4 fade-in duration-300">
                       <div className={`px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 border ${toastType === 'error' ? 'bg-red-600 text-white border-red-800' : 'bg-indigo-950 text-white border-indigo-800/50'}`}>
                         {toastType === 'error' ? <AlertTriangle size={16} className="text-white" /> : <Info size={16} className="text-indigo-400" />}
                         <span className="text-sm font-bold tracking-tight">{toast}</span>
                       </div>
                    </div>
                  )}
                </div>
              </main>

              {/* MODALS */}
              {previewFile && <FilePreviewModal file={previewFile} onClose={() => setPreviewFile(null)} />}

              {isAddRestaurantModalOpen && <RestaurantModal title="Dodaj Nową Restaurację" data={newRestaurant} setData={setNewRestaurant} onSave={handleAddRestaurant} onCancel={() => setIsAddRestaurantModalOpen(false)} isSubmitting={isSubmittingAction} />}
              {isEditRestaurantModalOpen && <RestaurantModal title="Edytuj Dane Restauracji" data={editRestaurantData} setData={setEditRestaurantData} onSave={handleUpdateRestaurant} onCancel={() => setIsEditRestaurantModalOpen(false)} isSubmitting={isSubmittingAction} />}
              
              {isAddTaskModalOpen && <TaskModal title="Dodaj nowe zadanie" data={newTaskData} setData={setNewTaskData} onSave={handleAddTask} onCancel={() => setIsAddTaskModalOpen(false)} isEdit={false} isSubmitting={isSubmittingAction} />}
              {isEditTaskModalOpen && editTaskData && <TaskModal title="Edytuj zadanie" data={editTaskData} setData={setEditTaskData} onSave={handleUpdateTask} onCancel={() => setIsEditTaskModalOpen(false)} isEdit={true} isSubmitting={isSubmittingAction} />}

              {isPasswordModalOpen && passwordUser && (
                <div className="fixed inset-0 z-[160] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => !isSubmittingAction && setIsPasswordModalOpen(false)} />
                  <div className="bg-white rounded-3xl p-8 w-full max-w-sm relative shadow-2xl animate-in zoom-in duration-200 text-indigo-950">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="w-10 h-10 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center"><Key size={20} /></div>
                        <div>
                            <h3 className="text-lg font-black tracking-tight text-indigo-900 leading-tight">Zarządzanie Hasłem</h3>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{passwordUser.email}</p>
                        </div>
                    </div>
                    
                    <div className="space-y-6">
                        <div>
                            <p className="text-xs text-slate-500 mb-3 leading-relaxed">
                                Aby bezpiecznie zresetować hasło użytkownika, wyślij mu oficjalny link na adres e-mail, z którego będzie mógł ustawić nowe, własne hasło.
                            </p>
                            <button onClick={() => handleSendPasswordResetEmail(passwordUser.email)} disabled={isSubmittingAction} className="w-full py-2.5 text-xs font-bold text-indigo-700 bg-indigo-50 border border-indigo-200 hover:bg-indigo-100 rounded-xl transition-all shadow-sm">
                                Wyślij link do resetu hasła
                            </button>
                        </div>

                        <div className="relative border-t border-slate-100 pt-6">
                            <span className="absolute -top-2.5 left-1/2 -translate-x-1/2 bg-white px-2 text-[10px] font-black text-slate-300 uppercase tracking-widest">LUB RĘCZNIE</span>
                            <form onSubmit={handleSimulatePasswordChange}>
                                <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Wymuś nowe hasło</label>
                                <input type="text" required minLength="6" placeholder="Wpisz nowe hasło..." className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm text-indigo-950 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" value={newAdminPassword} onChange={(e) => setNewAdminPassword(e.target.value)} />
                                <button type="submit" disabled={isSubmittingAction || !newAdminPassword} className="w-full py-3 mt-3 text-xs font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 shadow-md transition-all active:scale-95 disabled:opacity-50">
                                    {isSubmittingAction ? <Loader2 size={14} className="animate-spin mx-auto" /> : 'Zmień hasło w bazie'}
                                </button>
                            </form>
                        </div>
                    </div>
                    
                    <button onClick={() => setIsPasswordModalOpen(false)} disabled={isSubmittingAction} className="mt-4 w-full py-2.5 text-xs font-bold text-slate-500 hover:bg-slate-50 rounded-xl transition-colors">Zamknij</button>
                  </div>
                </div>
              )}

              {isDeleteModalOpen && (
                <div className="fixed inset-0 z-[130] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => !isSubmittingAction && setIsDeleteModalOpen(false)} />
                  <div className="bg-white rounded-3xl p-8 w-full max-w-sm relative shadow-2xl animate-in zoom-in duration-200 text-center text-indigo-950">
                    <div className="w-16 h-16 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-4"><Trash2 size={32} /></div>
                    <h3 className="text-lg font-black mb-2 tracking-tight">Usuwanie lokalu</h3>
                    <p className="text-sm text-slate-500 mb-8 leading-relaxed">Czy na pewno chcesz usunąć tę restaurację z bazy?</p>
                    <div className="flex gap-3">
                      <button onClick={() => setIsDeleteModalOpen(false)} disabled={isSubmittingAction} className="flex-1 py-3 text-xs font-bold text-slate-400 hover:bg-slate-50 rounded-xl transition-colors uppercase tracking-widest disabled:opacity-50">Anuluj</button>
                      <button onClick={handleDeleteRestaurant} disabled={isSubmittingAction} className="flex-1 py-3 text-xs font-bold text-white bg-red-600 rounded-xl hover:bg-red-700 transition-colors uppercase tracking-widest disabled:opacity-50 flex justify-center items-center">
                        {isSubmittingAction ? <Loader2 size={16} className="animate-spin" /> : 'Usuń lokal'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {taskToDelete && (
                <div className="fixed inset-0 z-[140] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => !isSubmittingAction && setTaskToDelete(null)} />
                  <div className="bg-white rounded-3xl p-8 w-full max-w-sm relative shadow-2xl animate-in zoom-in duration-200 text-center text-indigo-950">
                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4"><Trash2 size={32} /></div>
                    <h3 className="text-lg font-black mb-2 tracking-tight">Usuń zadanie</h3>
                    <p className="text-sm text-slate-500 mb-8 leading-relaxed text-center">Czy na pewno chcesz trwale usunąć to zadanie?</p>
                    <div className="flex gap-3">
                      <button onClick={() => setTaskToDelete(null)} disabled={isSubmittingAction} className="flex-1 py-3 text-xs font-bold text-slate-400 hover:bg-slate-50 rounded-xl transition-colors uppercase tracking-wider disabled:opacity-50">Anuluj</button>
                      <button onClick={handleConfirmDeleteTask} disabled={isSubmittingAction} className="flex-1 py-3 text-xs font-bold text-white bg-red-600 rounded-xl hover:bg-red-700 transition-colors uppercase tracking-wider disabled:opacity-50 flex justify-center items-center">
                         {isSubmittingAction ? <Loader2 size={16} className="animate-spin" /> : 'Usuń'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {isNoteModalOpen && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => !isSubmittingAction && setIsNoteModalOpen(false)} />
                  <div className="bg-white rounded-3xl p-8 w-full max-w-md relative shadow-2xl animate-in zoom-in duration-200 text-indigo-950">
                    <h3 className="text-xl font-black mb-6 tracking-tight text-indigo-900">Nowa wspólna notatka</h3>
                    <form onSubmit={handleAddNote} className="space-y-4">
                      <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tytuł</label><input required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={newNote.title} onChange={e => setNewNote({...newNote, title: e.target.value})} /></div>
                      <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Treść</label><textarea required rows="5" className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm resize-none text-indigo-950" value={newNote.content} onChange={e => setNewNote({...newNote, content: e.target.value})} /></div>
                      <div className="flex gap-3 pt-4">
                        <button type="button" onClick={() => setIsNoteModalOpen(false)} disabled={isSubmittingAction} className="flex-1 py-3 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-xl transition-colors disabled:opacity-50">Anuluj</button>
                        <button type="submit" disabled={isSubmittingAction} className="flex-1 py-3 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all disabled:opacity-50 flex justify-center items-center gap-2">
                           {isSubmittingAction ? <Loader2 size={16} className="animate-spin" /> : 'Zapisz dla wszystkich'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {isEditNoteModalOpen && editNoteData && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => !isSubmittingAction && setIsEditNoteModalOpen(false)} />
                  <div className="bg-white rounded-3xl p-8 w-full max-w-md relative shadow-2xl animate-in zoom-in duration-200 text-indigo-950">
                    <h3 className="text-xl font-black mb-6 tracking-tight text-indigo-900">Edytuj notatkę</h3>
                    <form onSubmit={handleUpdateNote} className="space-y-4">
                      <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Tytuł</label><input required className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm text-indigo-950" value={editNoteData.title} onChange={e => setEditNoteData({...editNoteData, title: e.target.value})} /></div>
                      <div><label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Treść</label><textarea required rows="5" className="w-full mt-1 p-3 bg-slate-50 border-none rounded-xl outline-none text-sm resize-none text-indigo-950" value={editNoteData.content} onChange={e => setEditNoteData({...editNoteData, content: e.target.value})} /></div>
                      <div className="flex gap-3 pt-4">
                        <button type="button" onClick={() => setIsEditNoteModalOpen(false)} disabled={isSubmittingAction} className="flex-1 py-3 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-xl transition-colors disabled:opacity-50">Anuluj</button>
                        <button type="submit" disabled={isSubmittingAction} className="flex-1 py-3 text-sm font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-100 transition-all disabled:opacity-50 flex justify-center items-center gap-2">
                           {isSubmittingAction ? <Loader2 size={16} className="animate-spin" /> : 'Zapisz zmiany'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {noteToDelete && (
                <div className="fixed inset-0 z-[140] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => !isSubmittingAction && setNoteToDelete(null)} />
                  <div className="bg-white rounded-3xl p-8 w-full max-w-sm relative shadow-2xl animate-in zoom-in duration-200 text-center text-indigo-950">
                    <div className="w-16 h-16 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4"><Trash2 size={32} /></div>
                    <h3 className="text-lg font-black mb-2 tracking-tight">Usuń notatkę</h3>
                    <p className="text-sm text-slate-500 mb-8 leading-relaxed text-center">Czy na pewno chcesz usunąć tę notatkę?</p>
                    <div className="flex gap-3">
                      <button onClick={() => setNoteToDelete(null)} disabled={isSubmittingAction} className="flex-1 py-3 text-xs font-bold text-slate-400 hover:bg-slate-50 rounded-xl transition-colors uppercase tracking-wider disabled:opacity-50">Anuluj</button>
                      <button onClick={handleConfirmDeleteNote} disabled={isSubmittingAction} className="flex-1 py-3 text-xs font-bold text-white bg-red-600 rounded-xl hover:bg-red-700 transition-colors uppercase tracking-wider disabled:opacity-50 flex justify-center items-center">
                         {isSubmittingAction ? <Loader2 size={16} className="animate-spin" /> : 'Usuń'}
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
